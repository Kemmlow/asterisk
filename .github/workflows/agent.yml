name: OPENHANDS-PROD-STACK
on:
  workflow_dispatch:
    inputs:
      task:
        description: 'Mission Objective'
        required: true
        default: 'Refactor the project for performance and fix any linting errors.'

jobs:
  run-openhands:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run OpenHands Agent
        uses: all-hands-ai/runtime@v0.1
        with:
          args: >
            --task "${{ github.event.inputs.task }}"
            --model "novita/${{ vars.MODEL_NAME }}"
            --api-key "${{ secrets.NOVITA_API_KEY }}"
            --base-url "https://api.novita.ai/openai"
            --instruction-file "PROMPT.md"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SANDBOX_USER_ID: "0"
          WORKSPACE_MOUNT_PATH: ${{ github.workspace }}

      - name: Audit Output
        run: |
          git status
          echo "OpenHands cycle complete."