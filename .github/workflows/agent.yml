name: Ling-1T Autonomous Agent
on:
  workflow_dispatch:
    inputs:
      task:
        description: 'Goal for the agent'
        required: true
        default: 'Research the latest benchmarks for Ling-2.6-1T.'

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node & Python
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          npm install -g @playwright/mcp@latest
          npx playwright install --with-deps chromium

      - name: Run Agent
        env:
          NOVITA_API_KEY: ${{ secrets.NOVITA_API_KEY }}
          NOVITA_BASE_URL: "https://api.novita.ai/openai"
          MODEL_NAME: "inclusionai/ling-2.6-1t"
          AGENT_TASK: ${{ github.event.inputs.task }}
        run: python agent_main.py
        
