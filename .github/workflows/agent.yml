name: OPENHANDS-PROD-SDK
on:
  workflow_dispatch:
    inputs:
      task:
        description: 'Mission Objective'
        required: true
        default: 'Refactor the project and fix any found issues.'

jobs:
  execute:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Setup Environment & Run Agent
        env:
          LLM_API_KEY: ${{ secrets.NOVITA_API_KEY }}
          LLM_BASE_URL: "https://api.novita.ai/openai"
          LLM_MODEL: "novita/${{ vars.MODEL_NAME }}"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AGENT_TASK: ${{ github.event.inputs.task }}
        run: |
          # Install SDK components
          uv pip install --system openhands-sdk openhands-tools openhands-workspace
          
          # Run the production controller
          python agent_main.py