name: Codex Flask PR (updated Kimi space)

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  codex:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Configure Codex for updated Kimi proxy
        run: |
          mkdir -p ~/.codex
          cat > ~/.codex/config.toml <<'EOF'
          model = "kimi-k2.6"
          model_provider = "kimi"
          approval_policy = "never"
          sandbox_mode = "workspace-write"

          [sandbox_workspace_write]
          network_access = true

          [model_providers.kimi]
          name = "Kimi Proxy"
          base_url = "https://kemmlowww-glm-5-1.hf.space/v1"
          env_key = "OPENAI_API_KEY"
          wire_api = "responses"
          request_max_retries = 10
          stream_max_retries = 20
          stream_idle_timeout_ms = 3600000
          EOF

      - name: Run Codex
        env:
          OPENAI_API_KEY: dummy
        run: |
          PROMPT=$(cat <<'EOF'
          Create a minimal Flask app in the repository root.
          Requirements:
          - write app.py in the root
          - app.py must use Flask
          - route '/' must return 'Hello from Codex'
          - write requirements.txt with only flask
          - do not add extra files
          - keep the code minimal and clean
          EOF
          )

          codex exec --sandbox workspace-write --json --output-last-message .codex-last-message.txt "$PROMPT"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: codex/flask-app
          title: "Codex: add minimal Flask app"
          body: |
            Generated with Codex CLI using the updated Kimi proxy provider.
            The workflow uses the Responses API and workspace-write sandbox.
          commit-message: "feat: add minimal Flask app"
          delete-branch: true
