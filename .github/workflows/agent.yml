# ╔══════════════════════════════════════════════════════════════════╗
# ║              Forge: Aider + Novita AI  (v4 — playwright MCP)    ║
# ║  • @playwright/mcp  — zero API keys, fully local, headless      ║
# ║  • mcp-server-fetch — lightweight fallback fetcher              ║
# ║  • 3-hour hard ceiling                                           ║
# ║  • Zero token limits (unlimited Novita API)                      ║
# ║  • ling-2.6-1t hardcoded                                         ║
# ║  • SAST lint gate (cppcheck) before PR                           ║
# ╚══════════════════════════════════════════════════════════════════╝
name: "Forge: Aider + Novita AI"

on:
  workflow_dispatch:
    inputs:
      task_description:
        description: 'Target Build Task'
        required: true
        default: >-
          Write a prod-grade AES-256-GCM + ChaCha20-Poly1305 dual-cipher
          crypter in C++20. ZERO brevity. ZERO stubs. ONLY complete,
          production-quality, real-world hyper-complex best code.
      max_fix_iterations:
        description: 'Max build-fix loops before giving up'
        required: false
        default: '20'

# ── Only one forge run per branch at a time ───────────────────────
concurrency:
  group: forge-${{ github.ref }}
  cancel-in-progress: false

jobs:
  forge:
    runs-on: ubuntu-latest
    timeout-minutes: 180           # ← 3 hours hard ceiling
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: write

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Python 3.12 ──────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ── 3. Node 20 (required for npx @playwright/mcp) ───────────
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 4. System deps + build toolchain ────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build \
            libssl-dev libsodium-dev \
            cppcheck \
            # Playwright/Chromium runtime deps on Ubuntu
            libnss3 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 libxcomposite1 \
            libxdamage1 libxfixes3 libxrandr2 libgbm1 \
            libasound2

      # ── 5. Python deps ──────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          pip install -q --upgrade pip
          pip install -q aider-chat uv

      # ── 6. Install Playwright + Chromium (no API key needed) ─────
      #    We install the package globally so npx can find it fast,
      #    then pull only Chromium — smallest footprint for headless CI.
      - name: Install Playwright MCP + Chromium browser
        run: |
          npm install -g @playwright/mcp@latest
          # Install only Chromium — Firefox/WebKit not needed in CI
          npx playwright install chromium --with-deps
          echo "::notice::Playwright + Chromium installed successfully."

      # ── 7. Validate secrets ──────────────────────────────────────
      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.NOVITA_API_KEY }}" ]; then
            echo "::error::NOVITA_API_KEY is not set. Aborting."
            exit 1
          fi
          echo "::notice::Playwright MCP active (no API key required)."

      # ── 8. Write .aider.mcp.json ─────────────────────────────────
      #    TWO local servers — both zero API keys:
      #      ① @playwright/mcp   → full browser: navigate, search, fetch,
      #                            JS execution, accessibility snapshots
      #      ② mcp-server-fetch  → lightweight plain HTTP fallback
      #
      #    --headless is critical: GitHub Actions has no display server.
      #    --no-sandbox required for Chromium inside a container/CI env.
      - name: Write .aider.mcp.json
        run: |
          cat > .aider.mcp.json << 'EOF'
          {
            "mcpServers": {
              "playwright": {
                "command": "npx",
                "args": [
                  "@playwright/mcp@latest",
                  "--headless",
                  "--no-sandbox",
                  "--browser=chromium"
                ]
              },
              "fetch": {
                "command": "uvx",
                "args": ["mcp-server-fetch"]
              }
            }
          }
          EOF
          echo "--- .aider.mcp.json ---"
          cat .aider.mcp.json

      # ── 9. Forge ─────────────────────────────────────────────────
      - name: Forge (Aider autonomous build loop)
        env:
          OPENAI_API_KEY:  ${{ secrets.NOVITA_API_KEY }}
          OPENAI_API_BASE: "https://api.novita.ai/openai/v1"
          MAX_ITERATIONS:  ${{ github.event.inputs.max_fix_iterations }}
          TASK:            ${{ github.event.inputs.task_description }}
        run: |
          set -euo pipefail

          git config user.name  "forge-bot"
          git config user.email "forge@ci.local"
          git checkout -b "forge/${{ github.run_id }}"

          # ── Persona (repo PROMPT.md wins, safe fallback otherwise) ─
          SKILL=$(cat PROMPT.md 2>/dev/null || cat << 'SKILL_EOF'
          You are a world-class C++20 systems engineer with 20 years of
          cryptography and OS-level programming experience.
          You write ONLY complete, compilable, production-grade code.
          You NEVER write pseudo-code, TODOs, stubs, or placeholder comments.
          You verify every API signature before using it via MCP browser search.
          SKILL_EOF
          )

          # Seed file so aider always has a repo target
          touch forge_output.cpp
          git add forge_output.cpp

          aider \
            --model "openai/inclusionai/ling-2.6-1t" \
            --yes-always \
            --auto-commits \
            --no-auto-lint \
            --no-stream \
            --message "$SKILL

          ════════════════════════════════════════════════════════════
          TASK  : $TASK
          ════════════════════════════════════════════════════════════

          ██████████ MCP TOOL USAGE — MANDATORY ██████████████████████
          You have TWO MCP servers connected and active RIGHT NOW.
          Both require ZERO API keys and are fully local:

            ① playwright  (primary — full browser, use this for search)
               Tools available:
               • browser_navigate  → open any URL in headless Chromium
               • browser_snapshot  → read the page as an accessibility tree
               • browser_click     → click search results, links, buttons
               • browser_type      → type into search boxes
               • browser_wait_for  → wait for dynamic content to load

            ② fetch  (fallback — fast plain HTTP for known stable URLs)
               Tools available:
               • fetch_url → pull any public URL as plain text/markdown

          ── HOW TO DO A WEB SEARCH (step by step) ───────────────────
          Step 1  → browser_navigate to:
                      https://www.google.com/search?q=YOUR+QUERY+HERE
                    OR https://duckduckgo.com/?q=YOUR+QUERY+HERE
                    (DuckDuckGo is more bot-friendly — prefer it)

          Step 2  → browser_snapshot  to read the search results list

          Step 3  → browser_click on the most relevant result link

          Step 4  → browser_snapshot  to read the actual page content

          Step 5  → ONLY then write code based on verified content

          ── HOW TO FETCH A KNOWN URL DIRECTLY ───────────────────────
          For cppreference, OpenSSL docs, libsodium docs — use fetch:
            fetch_url("https://en.cppreference.com/w/cpp/...")
            fetch_url("https://docs.openssl.org/...")
            fetch_url("https://libsodium.gitbook.io/doc/...")

          ── MANDATORY SEARCH-BEFORE-CODE PROTOCOL ───────────────────
          BEFORE writing ANY function call you are not 100% certain of:
            1. DuckDuckGo search: '<function name> cppreference'
            2. Navigate to the cppreference result
            3. Read the EXACT function signature from the page
            4. ONLY then write the code using that verified signature

          NEVER invent:
            • Function signatures or overloads
            • Enum values or macro names
            • CMake target names or find_package() module names
            • Struct member names or template parameters

          If a search returns nothing → use the safest known fallback
          and document exactly why in a code comment.

          ████████████ AUTONOMOUS EXECUTION CONTRACT ██████████████████
          YOU ARE IN FULLY AUTONOMOUS MODE.
          THE API HAS NO TOKEN LIMIT.
          Write every file in full. Every function completely.
          Every code path explicitly. DO NOT abbreviate anything.
          DO NOT ask for confirmation. DO NOT summarise. 
          DO NOT add TODO comments or placeholder stubs.

          ── PHASE 1 · RESEARCH ───────────────────────────────────────
          • DuckDuckGo search for the current stable API of EVERY library
            you plan to use before writing a single line of code
          • Search CMake find_package() module names and imported target
            names — these are commonly wrong when hallucinated
          • Search for deprecation notices on any API older than C++17
          • Only proceed to PHASE 2 after all APIs are verified

          ── PHASE 2 · IMPLEMENT ──────────────────────────────────────
          • Write EVERY file in full: all headers, sources, CMakeLists.txt
          • C++20 throughout: RAII, smart pointers, std::expected,
            concepts, ranges, std::span, std::string_view
          • Zero placeholders · Zero TODOs · Zero stub functions
          • Both happy path AND every error path fully implemented
          • Secure coding: zeroize sensitive buffers on destruction,
            check ALL return values, constant-time MAC comparison

          ── PHASE 3 · BUILD ──────────────────────────────────────────
          Run EXACTLY:
            rm -rf build && cmake -B build -G Ninja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_CXX_STANDARD=20 \
              -DCMAKE_CXX_FLAGS=\"-Wall -Wextra -Werror -pedantic\" \
              && cmake --build build --parallel

          ── PHASE 4 · EVALUATE ───────────────────────────────────────
          cmake exits 0  →  SUCCESS. STOP immediately.
          cmake exits ≠0 →  PHASE 5 immediately.

          ── PHASE 5 · DIAGNOSE & FIX ─────────────────────────────────
          For EVERY error/warning line:
            error: use of undeclared identifier
              → browser_navigate to DuckDuckGo, search the identifier,
                find the correct header, add it
            error: no matching function for call to X
              → fetch_url the cppreference page for X, read exact overloads
            error: undefined reference to X
              → Add X's library to target_link_libraries in CMakeLists.txt
                (search CMake docs if unsure of the imported target name)
            warning: unused parameter
              → [[maybe_unused]] or actually use it
            warning: narrowing conversion
              → explicit static_cast<> with a safety comment
            warning: deprecated
              → DuckDuckGo search for the modern replacement
            ANY other diagnostic
              → Fix the root cause. Never suppress with pragmas or casts
                unless provably safe and commented.
          Commit ALL fixes. Return to PHASE 3.

          ── PHASE 6 · REPEAT ─────────────────────────────────────────
          Loop PHASE 3 → 4 → 5 until PHASE 4 says SUCCESS.
          Max iterations: $MAX_ITERATIONS
          YOU MUST NOT STOP until cmake exits with code 0."

          # ── Guard: fail loudly if aider made zero commits ─────────
          COMMITS_AHEAD=$(git rev-list --count origin/main..HEAD 2>/dev/null || echo 0)
          echo "Commits ahead of main: $COMMITS_AHEAD"
          if [ "$COMMITS_AHEAD" -eq 0 ]; then
            echo "::error::Aider produced zero commits — model failed silently."
            exit 1
          fi

      # ── 10. SAST gate (cppcheck) ─────────────────────────────────
      - name: SAST — cppcheck
        run: |
          set -euo pipefail
          CPP_FILES=$(git diff --name-only origin/main..HEAD \
                      | grep -E '\.(cpp|h|hpp|cxx)$' || true)

          if [ -z "$CPP_FILES" ]; then
            echo "No C++ source files found — skipping cppcheck."
            exit 0
          fi

          echo "Running cppcheck on:"
          echo "$CPP_FILES"

          cppcheck \
            --enable=warning,style,performance,portability \
            --std=c++20 \
            --suppress=missingIncludeSystem \
            --error-exitcode=1 \
            --inline-suppr \
            $CPP_FILES \
          || {
            echo "::error::cppcheck found issues. Fix before merging."
            exit 1
          }

      # ── 11. Ship ─────────────────────────────────────────────────
      - name: Ship — push branch & open PR
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          BRANCH="forge/${{ github.run_id }}"
          git push -u origin "$BRANCH"
          COMMIT_COUNT=$(git rev-list --count origin/main..HEAD)

          gh pr create \
            --title "🔨 Forge: ${{ github.event.inputs.task_description }}" \
            --body "## Forge Build Report

          | Field            | Value |
          |------------------|-------|
          | **Status**       | ✅ Build verified green |
          | **Agent**        | Aider (autonomous loop) |
          | **Model**        | inclusionai/ling-2.6-1t |
          | **Token limit**  | None (unlimited API) |
          | **MCP Servers**  | @playwright/mcp (headless Chromium) · mcp-server-fetch |
          | **API keys**     | None required — fully local MCP |
          | **Commits**      | $COMMIT_COUNT |
          | **SAST**         | cppcheck passed |
          | **Timeout**      | 3 hours |
          | **Run**          | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

          > Playwright MCP (headless Chromium) was active during generation.
          > The agent navigated DuckDuckGo and cppreference.com live to verify
          > every API signature before writing code — no API key required." \
            --base main \
            --head "$BRANCH"

      # ── 12. Failure diagnostics ───────────────────────────────────
      - name: Dump logs on failure
        if: failure()
        run: |
          echo "=== Last 20 git commits ==="
          git log --oneline -20 || true
          echo "=== .aider.mcp.json ==="
          cat .aider.mcp.json || true
          echo "=== CMake error log ==="
          cat build/CMakeFiles/CMakeError.log 2>/dev/null || true
          echo "=== Playwright version ==="
          npx playwright --version || true
