name: Ling-1T Autonomous Agent
on:
  workflow_dispatch:
    inputs:
      task:
        description: 'What should the agent do?'
        required: true
        default: 'Research the latest AI news and summarize.'

jobs:
  run-autonomous-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python Dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright MCP
        run: |
          npm install -g @modelcontextprotocol/server-playwright
          npx playwright install --with-deps chromium

      - name: Execute Autonomous Loop
        env:
          NOVITA_API_KEY: ${{ secrets.NOVITA_API_KEY }}
          NOVITA_BASE_URL: "https://api.novita.ai/v1"
          MODEL_NAME: "inclusionai/ling-2.6-1t"
          AGENT_TASK: ${{ github.event.inputs.task }}
        run: python agent_main.py
        
