name: AI Rust Autonomous Agent

on:
  workflow_dispatch:

jobs:
  agent:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # max allowed (6h)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install openai

      - name: Run Autonomous Agent Loop
        env:
          OPENAI_API_KEY: dummy
          OPENAI_BASE_URL: https://kemmlowww-glm-5-1.hf.space/v1
        run: |
          python << 'PY'
          import os, subprocess, json, time
          from openai import OpenAI

          client = OpenAI(
              api_key=os.environ["OPENAI_API_KEY"],
              base_url=os.environ["OPENAI_BASE_URL"]
          )

          MAX_ITERS = 999999  # "infinite"
          SLEEP = 2

          def run_cmd(cmd):
              try:
                  out = subprocess.check_output(cmd, shell=True, stderr=subprocess.STDOUT, timeout=60)
                  return out.decode()
              except subprocess.CalledProcessError as e:
                  return e.output.decode()
              except Exception as e:
                  return str(e)

          def write_file(path, content):
              os.makedirs(os.path.dirname(path) or ".", exist_ok=True)
              with open(path, "w") as f:
                  f.write(content)

          def delete_file(path):
              if os.path.exists(path):
                  os.remove(path)

          def read_tree():
              files = []
              for root, _, fs in os.walk("."):
                  for f in fs:
                      if ".git" in root:
                          continue
                      files.append(os.path.join(root, f))
              return files[:200]

          SYSTEM_PROMPT = """
          You are an autonomous Rust engineer agent.

          You MUST return ONLY JSON:

          {
            "thought": "...",
            "actions": [
              {"type": "write", "path": "...", "content": "..."},
              {"type": "delete", "path": "..."},
              {"type": "cmd", "command": "..."}
            ]
          }

          Goals:
          - Build a useful Rust CLI tool or server
          - Improve code continuously
          - Fix build errors automatically
          - Run cargo build/test frequently
          - Add features iteratively

          Rules:
          - Always include at least one action
          - Prefer small incremental improvements
          - If build fails, fix it
          - Keep project compiling
          """

          for i in range(MAX_ITERS):
              print(f"\n--- ITERATION {i} ---")

              tree = read_tree()

              context = f"""
              Files:
              {tree}

              Recent build:
              {run_cmd("cargo build 2>&1 | tail -n 50")}
              """

              try:
                  resp = client.responses.create(
                      model="kimi-k2.6",
                      input=SYSTEM_PROMPT + "\n" + context,
                  )

                  text = resp.output_text.strip()

                  if text.startswith("```"):
                      text = text.split("```")[1]

                  data = json.loads(text)

              except Exception as e:
                  print("MODEL ERROR:", e)
                  time.sleep(SLEEP)
                  continue

              print("THOUGHT:", data.get("thought"))

              for act in data.get("actions", []):
                  t = act.get("type")

                  if t == "write":
                      print("WRITE:", act["path"])
                      write_file(act["path"], act["content"])

                  elif t == "delete":
                      print("DELETE:", act["path"])
                      delete_file(act["path"])

                  elif t == "cmd":
                      print("CMD:", act["command"])
                      out = run_cmd(act["command"])
                      print(out[:500])

              # ensure repo exists
              if not os.path.exists("Cargo.toml"):
                  print("Bootstrapping Rust project")
                  run_cmd("cargo init --bin .")

              # auto commit
              run_cmd('git config user.name "ai-bot"')
              run_cmd('git config user.email "ai@bot.com"')
              run_cmd("git add .")
              run_cmd(f'git commit -m "iter {i}" || true')

              time.sleep(SLEEP)

          PY

      - name: Push changes
        run: |
          git push origin HEAD || echo "push skipped"
