name: "Forge: Create from Scratch"

on:
  workflow_dispatch:
    inputs:
      task_description:
        description: 'Target Build Task'
        required: true
        default: 'Write a prod grade crypter in cpp 20, with super duper huper level brilliance accuracy, ZERO BREVITY, ZERO EXAMPLE/CONCEPTUAL CODE, ONLY REAL WORLD HYPER COMPLEX BEST CODE'

jobs:
  build_from_scratch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Load Instructions Safely
        run: |
          # This 'EOF' method prevents Bash from tripping over parentheses in your prompt
          echo "SYSTEM_PROMPT<<ENI_PROMPT_DELIMITER" >> $GITHUB_ENV
          if [ -f PROMPT.md ]; then
            cat PROMPT.md >> $GITHUB_ENV
          else
            echo "Act as a Senior C++ Engineer." >> $GITHUB_ENV
          fi
          echo "ENI_PROMPT_DELIMITER" >> $GITHUB_ENV

      - name: Run OpenHands Agent
        run: |
          # Use a heredoc for the docker command to avoid shell escaping nightmares
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v $(pwd):/opt/workspace_base \
            -e LLM_API_KEY=${{ secrets.NOVITA_API_KEY }} \
            -e LLM_BASE_URL="https://api.novita.ai/v3/openai" \
            -e LLM_MODEL="openai/inclusionai/ling-2.6-1t" \
            -e LLM_SYSTEM_PROMPT="${{ env.SYSTEM_PROMPT }}" \
            -e WORKSPACE_BASE="/opt/workspace_base" \
            -e GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} \
            -e SANDBOX_USER_ID=$(id -u) \
            ghcr.io/all-hands-ai/openhands:0.12 \
            python3 -m openhands.core.main \
            -t "${{ github.event.inputs.task_description }}" \
            -d /opt/workspace_base \
            -i 500
