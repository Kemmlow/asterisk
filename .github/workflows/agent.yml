name: "Forge: Aider + Novita AI"

on:
  workflow_dispatch:
    inputs:
      task_description:
        description: 'Target Build Task'
        required: true
        default: 'Write a prod grade crypter in cpp 20, with super duper huper level brilliance accuracy, ZERO BREVITY, ZERO EXAMPLE/CONCEPTUAL CODE, ONLY REAL WORLD HYPER COMPLEX BEST CODE'

jobs:
  forge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install -q aider-chat
          sudo apt-get update -qq
          sudo apt-get install -y build-essential cmake ninja-build libssl-dev

      - name: Forge
        env:
          OPENAI_API_KEY: ${{ secrets.NOVITA_API_KEY }}
          OPENAI_API_BASE: "https://api.novita.ai/openai/v1"
        run: |
          git config user.name "forge-bot"
          git config user.email "forge@ci.local"
          git checkout -b "forge/${{ github.run_id }}"

          SKILL=$(cat PROMPT.md 2>/dev/null || echo "You are an elite C++ engineer.")

          aider \
            --model "openai/inclusionai/ling-2.6-1t" \
            --yes-always \
            --auto-commits \
            --no-auto-lint \
            --map-tokens 8192 \
            --max-chat-history-tokens 128000 \
            --message "$SKILL

          ═══════════════════════════════════════════════
          TASK: ${{ github.event.inputs.task_description }}
          ═══════════════════════════════════════════════

          YOU ARE OPERATING IN FULLY AUTONOMOUS MODE.
          YOU HAVE UNLIMITED TOKENS. DO NOT ABBREVIATE ANYTHING.

          MANDATORY AUTONOMOUS EXECUTION LOOP:

          PHASE 1 — IMPLEMENT
          - Write every single file completely (headers, sources, CMakeLists.txt)
          - Zero placeholders, zero TODOs, zero stub functions
          - Full C++20: RAII, smart pointers, std::expected, concepts, ranges
          - Every function must have a complete real implementation

          PHASE 2 — BUILD
          Run this exact command and capture ALL output:
          rm -rf build && cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_FLAGS=\"-std=c++20 -Wall -Wextra -Werror\" && cmake --build build --parallel

          PHASE 3 — EVALUATE
          IF build succeeded with zero errors → YOU ARE DONE. Stop.
          IF build failed → Go to PHASE 4 immediately.

          PHASE 4 — FIX
          Read EVERY compiler error in the output carefully:
          - Type mismatch (e.g. std::array vs std::vector) → use .assign(x.begin(), x.end())
          - Unused parameter with -Werror → add [[maybe_unused]] or use the param
          - Missing include → add the correct #include
          - Undefined reference → add to CMakeLists.txt target_link_libraries
          - Any other error → fix the root cause, never suppress with casts
          Fix ALL errors found. Commit fixes. Then go back to PHASE 2.

          PHASE 5 — REPEAT
          Keep looping PHASE 2 → PHASE 3 → PHASE 4 until PHASE 3 says SUCCESS.
          There is no iteration limit. Do not stop until the build is GREEN.
          Do not ask for confirmation. Do not summarize. Just fix and build again.

          YOU MUST NOT EXIT UNTIL: cmake --build build exits with code 0."

      - name: Ship
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push -u origin "forge/${{ github.run_id }}"
          gh pr create \
            --title "Forge: ${{ github.event.inputs.task_description }}" \
            --body "**Build verified green** | Agent: Aider | Model: ling-2.6-1t | Unlimited token mode" \
            --base main \
            --head "forge/${{ github.run_id }}"
