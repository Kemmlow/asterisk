# ╔══════════════════════════════════════════════════════════════════╗
# ║                    KawaiiForge: Autonomous AI Builder           ║
# ║  • Fully autonomous agent for ANY language and ANY task         ║
# ║  • Default task: Cute kawaii file converter for elderly staff   ║
# ║  • Playwright MCP (local, zero API keys, headless Chromium)     ║
# ║  • Strong research-before-code protocol to eliminate hallucinations
# ║  • Intelligent autonomous loop (research → implement → validate → fix)
# ║  • 3-hour timeout, unlimited tokens, ling-2.6-1t                ║
# ╚══════════════════════════════════════════════════════════════════╝
name: "KawaiiForge: Autonomous AI Builder"

on:
  workflow_dispatch:
    inputs:
      task_description:
        description: 'Task for KawaiiForge'
        required: true
        default: >-
          Build a production-grade Flask web application that converts files
          bidirectionally between CSV, XLSX, XLS, and DBF formats.
          Target users: elderly staff. Style: cute, clean, unique, creative kawaii
          aesthetic (pastel pinks, blues, lavenders, sakura motifs, big friendly
          buttons with cute animal/flower icons, extremely large fonts, high
          contrast, simple 3-step wizard interface, drag-and-drop, clear large-text
          instructions, joyful and non-intimidating UI). Must be extremely easy to use.
          Production quality: proper security (sanitize uploads), error handling,
          logging, tests, accessibility (ARIA, keyboard nav), responsive design.
          Use best modern practices. ZERO stubs, ZERO TODOs, full implementation only.
      max_fix_iterations:
        description: 'Maximum validation-fix cycles'
        required: false
        default: '25'

concurrency:
  group: kawaiiforge-${{ github.ref }}
  cancel-in-progress: false

jobs:
  kawaiiforge:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build \
            libssl-dev libsodium-dev \
            cppcheck \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
            libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 \
            libgbm1 libasound2 \
            golang-go rustc cargo default-jdk

      - name: Install Python & Node tools
        run: |
          pip install -q --upgrade pip
          pip install -q aider-chat uv
          npm install -g @playwright/mcp@latest
          npx playwright install chromium --with-deps

      - name: Write KawaiiForge Persona (PROMPT.md)
        run: |
          cat > PROMPT.md << 'EOF'
          You are KawaiiForge — a world-class, gentle, and extremely thorough full-stack engineer who specializes in creating joyful, accessible, and production-grade software.
          Your signature style is "kawaii engineering": clean, cute, empathetic interfaces combined with rock-solid, secure, well-tested backend code.
          You always research APIs and best practices using the available MCP tools before writing any code.
          You never use placeholders, TODOs, stubs, or abbreviated code. Every file you produce must be complete and ready for production.
          EOF

      - name: Write .aider.mcp.json (Playwright + fetch)
        run: |
          cat > .aider.mcp.json << 'EOF'
          {
            "mcpServers": {
              "playwright": {
                "command": "npx",
                "args": ["@playwright/mcp@latest", "--headless", "--no-sandbox", "--browser=chromium"]
              },
              "fetch": {
                "command": "uvx",
                "args": ["mcp-server-fetch"]
              }
            }
          }
          EOF
          cat .aider.mcp.json

      - name: KawaiiForge — Autonomous Build Loop
        env:
          OPENAI_API_KEY: ${{ secrets.NOVITA_API_KEY }}
          OPENAI_API_BASE: "https://api.novita.ai/openai/v1"
          MAX_ITERATIONS: ${{ github.event.inputs.max_fix_iterations }}
          TASK: ${{ github.event.inputs.task_description }}
        run: |
          set -euo pipefail

          git config user.name "kawaiiforge-bot"
          git config user.email "kawaiiforge@ci.local"
          git checkout -b "kawaiiforge/${{ github.run_id }}"

          # Seed repo
          touch README.md
          git add README.md PROMPT.md .aider.mcp.json

          aider \
            --model "openai/inclusionai/ling-2.6-1t" \
            --yes-always \
            --auto-commits \
            --no-auto-lint \
            --no-stream \
            --message "You are KawaiiForge.

          Default mission (use this exact style and quality bar for this run):
          $TASK

          ███████████████ GENERAL AUTONOMOUS AGENT PROTOCOL ███████████████
          You are a fully autonomous software engineering agent capable of working in ANY programming language and framework.

          1. Analyze the task and choose the BEST language/stack for it.
          2. Use the playwright MCP to research documentation (DuckDuckGo + direct navigation to official docs, StackOverflow, MDN, Flask docs, pandas docs, Rust book, etc.).
          3. Create a complete production-grade project with:
             - All source files (no stubs)
             - Proper build system (CMake, Makefile, pyproject.toml, package.json, Cargo.toml, etc.)
             - Comprehensive tests
             - A validate.sh script that runs build → test → lint and exits 0 only on full success
             - README with clear instructions
             - Kawaii aesthetic when the task involves UI (large fonts, pastel colors, cute icons, high contrast, elderly-friendly design)

          MANDATORY RESEARCH PROTOCOL:
          - Before using ANY library, framework call, or API: use playwright to navigate DuckDuckGo or the official documentation site, then snapshot and read the exact current API.
          - Never hallucinate function signatures, class names, or configuration options.

          AUTONOMOUS EXECUTION LOOP:
          PHASE 1: Research all required APIs and best practices using playwright MCP.
          PHASE 2: Implement the complete project (all files, full functionality).
          PHASE 3: Create or update validate.sh that performs:
                    - Dependency installation
                    - Build / compile
                    - Run all tests
                    - Lint / static analysis
                    - Security checks where applicable
          PHASE 4: Run ./validate.sh
          PHASE 5: If it fails, analyze every error, research the fix using MCP if needed, fix the root cause, commit, and return to PHASE 4.
          Continue looping until ./validate.sh exits with code 0.

          You have effectively unlimited tokens and time (within the 3-hour CI limit). Do not summarize. Do not ask for permission. Produce only complete, high-quality, production-ready code.

          Max validation cycles: $MAX_ITERATIONS
          You must not stop until validate.sh succeeds."

          COMMITS_AHEAD=$(git rev-list --count origin/main..HEAD 2>/dev/null || echo 0)
          echo "Commits ahead of main: $COMMITS_AHEAD"
          if [ "$COMMITS_AHEAD" -eq 0 ]; then
            echo "::error::KawaiiForge produced no commits."
            exit 1
          fi

      - name: Final Validation Run
        run: |
          if [ -f "validate.sh" ]; then
            chmod +x validate.sh
            echo "Running final validation..."
            ./validate.sh || { echo "::error::Final validation failed after autonomous loop."; exit 1; }
          else
            echo "No validate.sh found — agent should have created one."
            exit 1
          fi

      - name: SAST — cppcheck (if C/C++ present)
        if: always()
        run: |
          if ls **/*.{cpp,cxx,h,hpp} 1> /dev/null 2>&1; then
            cppcheck --enable=warning,style,performance,portability --std=c++20 \
              --suppress=missingIncludeSystem --error-exitcode=1 --inline-suppr \
              **/*.{cpp,cxx,h,hpp} || echo "::warning::cppcheck issues found"
          fi

      - name: Ship — Create PR
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="kawaiiforge/${{ github.run_id }}"
          git push -u origin "$BRANCH"

          gh pr create \
            --title "🌸 KawaiiForge: ${{ github.event.inputs.task_description }}" \
            --body "## KawaiiForge Report

          | Item | Value |
          |------|-------|
          | **Status** | ✅ Fully autonomous completion |
          | **Agent** | KawaiiForge (Playwright MCP grounded) |
          | **Model** | inclusionai/ling-2.6-1t |
          | **Default Task** | Elderly-friendly kawaii file converter |
          | **Capability** | Any language, any task |
          | **Validation** | Multiple autonomous fix cycles until all tests pass |
          | **Run** | [Link](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

          Built with ❤️ by KawaiiForge — making software both powerful and adorable." \
            --base main \
            --head "$BRANCH"
