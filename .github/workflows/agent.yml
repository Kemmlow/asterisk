name: OpenAI Responses Flask PR

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install openai

      - name: Generate files via Responses API
        env:
          OPENAI_API_KEY: dummy
          OPENAI_BASE_URL: https://kemmlowww-glm-5-1.hf.space/v1
        run: |
          python << 'PY'
          import os, json
          from openai import OpenAI

          client = OpenAI(
              api_key=os.environ["OPENAI_API_KEY"],
              base_url=os.environ["OPENAI_BASE_URL"]
          )

          prompt = """
          Return ONLY valid JSON (no markdown, no explanation):

          {
            "app.py": "<python flask app>",
            "requirements.txt": "flask"
          }

          Rules:
          - app.py must use Flask
          - route '/' returns 'Hello from Codex'
          - minimal clean code
          """

          resp = client.responses.create(
              model="kimi-k2.6",
              input=prompt,
          )

          text = resp.output_text.strip()

          # fail-safe: extract JSON
          if text.startswith("```"):
              text = text.split("```")[1]

          data = json.loads(text)

          for name, content in data.items():
              with open(name, "w") as f:
                  f.write(content)

          print("Files written:", list(data.keys()))
          PY

      - name: Commit changes
        run: |
          git config user.name "ai-bot"
          git config user.email "ai@users.noreply.github.com"
          git checkout -b ai/flask-app
          git add app.py requirements.txt
          git commit -m "feat: add minimal Flask app via Responses API" || echo "No changes"

      - name: Push branch
        run: git push origin ai/flask-app || echo "Push skipped"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ai/flask-app
          title: "AI: minimal Flask app"
          body: |
            Generated using OpenAI-compatible Responses API (Kimi proxy).
          commit-message: "feat: add minimal Flask app"
          delete-branch: true
