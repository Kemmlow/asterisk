name: Codex Flask PR (Custom API)

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  codex:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Run Codex using YOUR API
        env:
          OPENAI_API_KEY: dummy
          OPENAI_BASE_URL: https://kemmlowww-glm-5-1.hf.space/v1
          CODEX_QUIET_MODE: 1
        run: |
          codex exec --full-auto -m kimi-k2.6 "
          Create a minimal Flask app in the root directory:

          - app.py with Flask
          - route '/' returns 'Hello from Codex'
          - requirements.txt with flask only
          - no extra explanation
          "

      - name: Commit changes
        run: |
          git config user.name "codex-bot"
          git config user.email "codex@users.noreply.github.com"
          git checkout -b codex/flask-app
          git add .
          git commit -m "feat: add Flask app via Codex (custom API)" || echo "No changes"

      - name: Push branch
        run: git push origin codex/flask-app || echo "Push skipped"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: codex/flask-app
          title: "Codex: Add Flask app (custom API)"
          body: |
            Generated using Codex CLI with custom proxy API
            Base: https://kemmlowww-glm-5-1.hf.space
