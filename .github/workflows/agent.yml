# ╔══════════════════════════════════════════════════════════════════╗
# ║                    KawaiiForge: Autonomous AI Builder           ║
# ║  • Fully autonomous agent for ANY language and ANY task         ║
# ║  • Default task: Cute kawaii file converter for elderly staff   ║
# ║  • Playwright MCP (local, zero API keys, headless Chromium)     ║
# ║  • Research-before-code protocol to eliminate hallucinations    ║
# ║  • Intelligent autonomous loop: research→implement→validate→fix ║
# ║  • 3-hour timeout, unlimited tokens, ling-2.6-1t                ║
# ╚══════════════════════════════════════════════════════════════════╝

name: "KawaiiForge: Autonomous AI Builder"

on:
  workflow_dispatch:
    inputs:
      task_description:
        description: "Task for KawaiiForge"
        required: true
        default: >-
          Build a production-grade Flask web application that converts files
          bidirectionally between CSV, XLSX, XLS, and DBF formats.
          Target users: elderly staff. Style: cute, clean, unique, creative kawaii
          aesthetic (pastel pinks, blues, lavenders, sakura motifs, big friendly
          buttons with cute animal/flower icons, extremely large fonts, high
          contrast, simple 3-step wizard interface, drag-and-drop, clear large-text
          instructions, joyful and non-intimidating UI). Must be extremely easy to use.
          Production quality: proper security (sanitize uploads), error handling,
          logging, tests, accessibility (ARIA, keyboard nav), responsive design.
          Use best modern practices. ZERO stubs, ZERO TODOs, full implementation only.
      max_fix_iterations:
        description: "Maximum validation-fix cycles"
        required: false
        default: "25"

concurrency:
  group: kawaiiforge-${{ github.ref }}
  cancel-in-progress: false

jobs:
  kawaiiforge:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: write

    steps:
      # ─────────────────────────────────────────────
      # 1. CHECKOUT
      # ─────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ─────────────────────────────────────────────
      # 2. LANGUAGE RUNTIMES
      # ─────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ─────────────────────────────────────────────
      # 3. SYSTEM DEPENDENCIES
      #    Ubuntu 24.04 Y2038 renames applied.
      # ─────────────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build \
            libssl-dev libsodium-dev \
            cppcheck \
            libnss3 \
            libatk1.0-0t64 \
            libatk-bridge2.0-0t64 \
            libcups2t64 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libgbm1 \
            libasound2t64 \
            golang-go rustc cargo default-jdk

      # ─────────────────────────────────────────────
      # 4. PYTHON TOOLS
      #    Install uv first — uvx must be on $PATH
      #    before the MCP server config references it.
      #    aider[playwright] covers built-in scraping
      #    fallback AND the MCP browser extras.
      # ─────────────────────────────────────────────
      - name: Install Python tools
        run: |
          pip install -q --upgrade pip
          pip install -q uv
          pip install -q "aider-chat[playwright]"

      # ─────────────────────────────────────────────
      # 5. NODE TOOLS + PLAYWRIGHT BROWSER
      #    FIX: @playwright/mcp is the correct package.
      #    npx playwright install covers the browser
      #    used by BOTH the MCP server AND aider's own
      #    playwright scraping fallback.
      # ─────────────────────────────────────────────
      - name: Install Node tools and Playwright browser
        run: |
          npm install -g @playwright/mcp@latest
          # Install Chromium for aider's own playwright module too
          npx playwright install chromium --with-deps
          python -m playwright install chromium --with-deps

      # ─────────────────────────────────────────────
      # 6. ATOMIC BOOTSTRAP
      #
      #  ONE shell, strict serial order:
      #    A) git config + checkout -b
      #    B) write every file
      #    C) git add + commit
      #
      #  KEY FIXES IN THIS STEP:
      #
      #  FIX 1 — MCP config named kawaii-mcp.json
      #    Aider automatically gitignores everything
      #    matching .aider* on first run. If the MCP
      #    config is called .aider.mcp.json it gets
      #    gitignored and aider may not load it.
      #    Naming it kawaii-mcp.json sidesteps this,
      #    and we pass it explicitly via --mcp-config.
      #
      #  FIX 2 — No placeholder URLs in the prompt
      #    Previous prompt contained literal strings:
      #      https://pypi.org/pypi/<pkg>/json
      #      https://crates.io/api/v1/crates/<crate>
      #    Aider treated these as real URLs, triggered
      #    its web scraper, and wasted the entire
      #    context window before writing a single file.
      #    All such example URLs are removed.
      #
      #  FIX 3 — Python script written to /tmp first
      #    Avoids heredoc-inside-heredoc quoting hell.
      # ─────────────────────────────────────────────
      - name: Bootstrap — branch, write files, commit
        env:
          TASK:           ${{ github.event.inputs.task_description }}
          MAX_ITERATIONS: ${{ github.event.inputs.max_fix_iterations }}
          RUN_ID:         ${{ github.run_id }}
        run: |
          # ── A) Git identity + feature branch ───────────────────────
          git config user.name  "kawaiiforge-bot"
          git config user.email "kawaiiforge@ci.local"
          git checkout -b "kawaiiforge/${RUN_ID}"

          # ── B-1) README.md ──────────────────────────────────────────
          cat > README.md << 'README_EOF'
          # 🌸 KawaiiForge

          Autonomously generated by **KawaiiForge** — a kawaii-style,
          production-grade autonomous AI builder powered by:
          * aider + ling-2.6-1t (via Novita AI)
          * Playwright MCP  (`@playwright/mcp` headless Chromium)
          * Fetch MCP       (`mcp-server-fetch`)

          See `validate.sh` for build / test / lint instructions.
          README_EOF

          # ── B-2) PROMPT.md ──────────────────────────────────────────
          cat > PROMPT.md << 'PERSONA_EOF'
          You are KawaiiForge — a world-class, gentle, and extremely thorough
          full-stack engineer who specialises in joyful, accessible,
          production-grade software.

          Your signature style is "kawaii engineering": clean, cute, empathetic
          interfaces combined with rock-solid, secure, well-tested backend code.

          You always research APIs and best practices with the available MCP
          tools before writing any code.

          You never use placeholders, TODOs, stubs, or abbreviated code.
          Every file you produce must be complete and ready for production.
          PERSONA_EOF

          # ── B-3) kawaii-mcp.json ────────────────────────────────────
          # FIX: NOT named .aider.mcp.json — aider gitignores .aider*
          # on first run. Use an explicit name + --mcp-config flag.
          cat > kawaii-mcp.json << 'MCP_EOF'
          {
            "mcpServers": {
              "playwright": {
                "command": "npx",
                "args": [
                  "@playwright/mcp@latest",
                  "--headless",
                  "--isolated",
                  "--no-sandbox",
                  "--browser=chromium"
                ]
              },
              "fetch": {
                "command": "uvx",
                "args": ["mcp-server-fetch"]
              }
            }
          }
          MCP_EOF
          echo "=== kawaii-mcp.json ===" && cat kawaii-mcp.json

          # ── B-4) AIDER_PROMPT.md via /tmp script ────────────────────
          # FIX: no placeholder URLs (they triggered aider's web
          # scraper and consumed the entire context window).
          cat > /tmp/gen_prompt.py << 'PYSCRIPT_EOF'
          import os, textwrap

          task     = os.environ["TASK"]
          max_iter = os.environ["MAX_ITERATIONS"]

          prompt = textwrap.dedent(f"""
          You are KawaiiForge — read PROMPT.md for your full persona.

          ═══════════════════════════ MISSION ═══════════════════════════
          {task}

          ═══════════════════ AUTONOMOUS AGENT PROTOCOL ══════════════════

          You are a fully autonomous software-engineering agent capable of
          working in ANY programming language and framework.

          ── PHASE 1 · RESEARCH ─────────────────────────────────────────
          Before writing any code use the MCP tools to verify every library,
          API, and configuration option you intend to use.

          Use the playwright MCP tool (browser_navigate, browser_snapshot):
            • Navigate to https://duckduckgo.com and search for each library.
            • Navigate to the official documentation site for each library.
            • Take a snapshot and read the current API surface carefully.
            • Confirm exact class names, function signatures, parameter names.

          Use the fetch MCP tool to retrieve package metadata:
            • For Python packages query the PyPI JSON API by constructing
              a URL with the real package name, for example pandas or flask.
            • For Rust crates query the crates.io API with the real crate name.
            • Never request a URL containing angle-bracket placeholders.

          Never assume or hallucinate — verify every detail before coding.

          ── PHASE 2 · IMPLEMENT ────────────────────────────────────────
          Produce a complete, production-grade project:
          • All source files — zero stubs, zero TODOs, zero placeholders.
          • Correct build system for the chosen stack.
          • Comprehensive automated test suite.
          • Security: sanitise all inputs, limit upload sizes, set secure
            headers, prevent path traversal.
          • Full structured logging and error handling throughout.
          • Accessibility: ARIA labels, keyboard nav, skip-links,
            high-contrast colours, minimum 18 pt body font.
          • Kawaii UI when the task involves a user interface:
            pastel pinks, blues, lavenders, sakura motifs, large friendly
            buttons with cute SVG animal/flower icons, 3-step wizard flow,
            drag-and-drop with clear visual feedback, joyful copy that
            never intimidates elderly users.

          ── PHASE 3 · validate.sh ──────────────────────────────────────
          Create (or update) validate.sh at the repo root:
            1. Install / sync all dependencies.
            2. Compile / build the project.
            3. Run every test suite.
            4. Run linters and static-analysis tools.
            5. Exit 0 ONLY when every prior step passes.
          The script must be fully self-contained — CI runs it cold.

          ── PHASE 4 · RUN ──────────────────────────────────────────────
          Execute:  bash validate.sh

          ── PHASE 5 · FIX LOOP ─────────────────────────────────────────
          If validate.sh exits non-zero:
          • Read every error line carefully.
          • Research the root cause via MCP tools if needed.
          • Apply a precise surgical fix.
          • Commit the fix with a descriptive message.
          • Return to PHASE 4.

          Repeat until validate.sh exits 0.
          Do NOT summarise. Do NOT ask for permission. Do NOT stop early.
          Max validation-fix cycles: {max_iter}
          """).strip()

          with open("AIDER_PROMPT.md", "w") as fh:
              fh.write(prompt + "\n")

          print("AIDER_PROMPT.md written OK")
          print(f"  {len(prompt)} chars, {len(prompt.splitlines())} lines")
          PYSCRIPT_EOF

          python3 /tmp/gen_prompt.py
          rm /tmp/gen_prompt.py

          # ── C) Stage and commit every file ─────────────────────────
          git add README.md PROMPT.md kawaii-mcp.json AIDER_PROMPT.md
          git diff --cached --quiet \
            || git commit -m "chore: KawaiiForge bootstrap files [skip ci]"

          echo ""
          echo "=== Bootstrap complete ==="
          git log --oneline -5
          ls -lah

      # ─────────────────────────────────────────────
      # 7. KAWAIIFORGE AUTONOMOUS BUILD LOOP
      #
      #  KEY FIXES IN THIS STEP:
      #
      #  FIX 1 — --mcp-config kawaii-mcp.json
      #    Previously omitted entirely. Without this
      #    explicit flag aider may not load MCP at all
      #    depending on version, and definitely won't
      #    if the config file was gitignored.
      #
      #  FIX 2 — --no-gitignore
      #    Prevents aider from appending .aider* rules
      #    to .gitignore mid-run, which could interfere
      #    with config file visibility.
      #
      #  FIX 3 — --map-tokens 2048
      #    Aider itself warns that > 2048 confuses LLMs
      #    with too much irrelevant context. Reduced.
      #
      #  FIX 4 — --no-show-model-warnings
      #    Suppresses the "unknown context window" noise
      #    so real errors are visible in the log.
      # ─────────────────────────────────────────────
      - name: KawaiiForge — Autonomous Build Loop
        env:
          OPENAI_API_KEY:  ${{ secrets.NOVITA_API_KEY }}
          OPENAI_API_BASE: "https://api.novita.ai/openai/v1"
        run: |
          aider \
            --model                 "openai/inclusionai/ling-2.6-1t" \
            --openai-api-base       "${OPENAI_API_BASE}" \
            --mcp-config            kawaii-mcp.json \
            --yes-always \
            --auto-commits \
            --no-auto-lint \
            --no-check-update \
            --no-gitignore \
            --no-show-model-warnings \
            --map-tokens            2048 \
            --message-file          AIDER_PROMPT.md \
            PROMPT.md

      # ─────────────────────────────────────────────
      # 8. VERIFY AGENT PRODUCED COMMITS
      #    Guard > 1 accounts for bootstrap commit.
      # ─────────────────────────────────────────────
      - name: Verify agent produced commits
        run: |
          COMMITS_AHEAD=$(git rev-list --count origin/main..HEAD 2>/dev/null || echo 0)
          echo "Commits ahead of main: ${COMMITS_AHEAD}"
          if [ "${COMMITS_AHEAD}" -le 1 ]; then
            echo "::error::KawaiiForge produced no meaningful commits beyond bootstrap."
            exit 1
          fi

      # ─────────────────────────────────────────────
      # 9. FINAL COLD VALIDATION RUN
      # ─────────────────────────────────────────────
      - name: Final validation run
        run: |
          if [ ! -f "validate.sh" ]; then
            echo "::error::validate.sh was not created by the agent."
            exit 1
          fi
          chmod +x validate.sh
          echo "════════════ Running final validate.sh ════════════"
          ./validate.sh
          echo "════════════ validate.sh exited 0 ✅ ════════════"

      # ─────────────────────────────────────────────
      # 10. OPTIONAL SAST (C/C++ only)
      # ─────────────────────────────────────────────
      - name: SAST — cppcheck (C/C++ projects only)
        if: always()
        run: |
          CPP_FILES=$(find . \
            -not -path './.git/*' \
            \( -name '*.cpp' -o -name '*.cxx' \
               -o -name '*.h'  -o -name '*.hpp' \) \
            2>/dev/null || true)
          if [ -n "$CPP_FILES" ]; then
            echo "Running cppcheck..."
            # shellcheck disable=SC2086
            cppcheck \
              --enable=warning,style,performance,portability \
              --std=c++20 \
              --suppress=missingIncludeSystem \
              --error-exitcode=1 \
              --inline-suppr \
              $CPP_FILES \
              || echo "::warning::cppcheck issues found — review before merge."
          else
            echo "No C/C++ files found — skipping cppcheck."
          fi

      # ─────────────────────────────────────────────
      # 11. SHIP — PUSH BRANCH & OPEN PR
      # ─────────────────────────────────────────────
      - name: Push branch and open pull request
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="kawaiiforge/${{ github.run_id }}"
          git push -u origin "$BRANCH"

          TASK_SHORT=$(echo "${{ github.event.inputs.task_description }}" \
                       | cut -c1-80)

          gh pr create \
            --title "🌸 KawaiiForge: ${TASK_SHORT}…" \
            --body "## 🌸 KawaiiForge Autonomous Build Report

          | Field | Value |
          |-------|-------|
          | **Status** | ✅ Fully autonomous completion |
          | **Agent** | KawaiiForge (Playwright MCP + Fetch MCP grounded) |
          | **Model** | \`inclusionai/ling-2.6-1t\` via Novita AI |
          | **MCP Tools** | \`@playwright/mcp\` (headless Chromium) + \`mcp-server-fetch\` |
          | **Validation** | Autonomous fix loop until \`validate.sh\` exits 0 |
          | **Run** | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

          ### Task
          \`\`\`
          ${{ github.event.inputs.task_description }}
          \`\`\`

          ---
          Built with ❤️ by KawaiiForge — powerful software, adorable delivery 🌸" \
            --base main \
            --head "$BRANCH"
