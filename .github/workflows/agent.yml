# ╔══════════════════════════════════════════════════════════════════════╗
# ║  OmniForge — Hyper-Autonomous AI Software Builder                   ║
# ║  • One prompt in → working, tested, validated PR out                 ║
# ║  • Any language, any framework, any domain                           ║
# ║  • opencode-ai in headless `run` mode (true zero-interaction)        ║
# ║  • Agent self-selects stack, installs deps, writes tests, fixes      ║
# ║  • Playwright MCP + Fetch MCP for live doc/API research              ║
# ║  • ling-2.6-1t (131k ctx) via Novita AI                             ║
# ╚══════════════════════════════════════════════════════════════════════╝

name: "OmniForge: Hyper-Autonomous AI Builder"

on:
  workflow_dispatch:
    inputs:
      task:
        description: "Describe what you want built (any language, any domain)"
        required: true
        default: >-
          Build a production-grade Flask web application that converts files
          bidirectionally between CSV, XLSX, XLS, and DBF formats.
          Target users: experienced elderly professionals (60s-70s) who are
          comfortable with computers but value clarity, efficiency, and dignity.
          Style: modern, sleek, high-contrast professional UI — think Bloomberg
          Terminal meets Apple Human Interface Guidelines. Dark mode default with
          a crisp light mode toggle. Large readable typography (minimum 18px body,
          24px+ headings) using a system font stack. Generous whitespace. Muted
          navy/slate/charcoal palette with a single bold accent color (electric
          blue or teal). No gradients, no animations, no clutter. Clean card-based
          layout. Prominent, well-labeled buttons with clear affordance. Keyboard
          accessible throughout. 3-step workflow: Upload → Configure → Download.
          Drag-and-drop upload zone with a large fallback file-picker button.
          Clear status messages in plain English — no jargon, no cutesy copy.
          Production quality: proper security (sanitize uploads, validate MIME
          types, cap file size), structured error handling with user-friendly
          messages, structured logging, comprehensive tests, full ARIA
          accessibility, responsive layout that works on 1080p monitors and
          tablets. ZERO stubs, ZERO TODOs, full implementation only.
      model:
        description: "Override model (optional)"
        required: false
        default: "novita/inclusionai/ling-2.6-1t"

concurrency:
  group: omniforge-${{ github.ref }}-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  omniforge:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: write

    steps:
      # ──────────────────────────────────────────────────────────────
      # 1. CHECKOUT
      # ──────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ──────────────────────────────────────────────────────────────
      # 2. LANGUAGE RUNTIMES
      # ──────────────────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Go (stable)
        uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Set up Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # ──────────────────────────────────────────────────────────────
      # 3. SYSTEM PACKAGES
      # ──────────────────────────────────────────────────────────────
      - name: Install system packages
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build pkg-config \
            libssl-dev libsodium-dev \
            cppcheck shellcheck \
            sqlite3 postgresql-client \
            ruby-full php-cli \
            libnss3 \
            libatk1.0-0t64 \
            libatk-bridge2.0-0t64 \
            libcups2t64 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libgbm1 \
            libasound2t64

      # ──────────────────────────────────────────────────────────────
      # 4. OPENCODE + MCP SERVERS
      # ──────────────────────────────────────────────────────────────
      - name: Install opencode and MCP tooling
        run: |
          set -euo pipefail
          pip install -q --upgrade pip uv playwright
          npm install -g opencode-ai@latest @playwright/mcp@latest
          npx playwright install chromium --with-deps
          python -m playwright install chromium --with-deps

          echo "=== Runtime versions ==="
          node  --version
          python --version
          go    version
          rustc --version
          java  --version 2>&1 | head -1
          dotnet --version
          opencode --version 2>/dev/null \
            || opencode run --help 2>/dev/null | head -3 \
            || echo "opencode installed (no --version flag)"

      # ──────────────────────────────────────────────────────────────
      # 5. SECRET GUARD
      # ──────────────────────────────────────────────────────────────
      - name: Guard — verify NOVITA_API_KEY is present
        env:
          NOVITA_API_KEY: ${{ secrets.NOVITA_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${NOVITA_API_KEY:-}" ]; then
            echo "::error::NOVITA_API_KEY secret is not set."
            echo "::error::Add it under Settings → Secrets → Actions."
            exit 1
          fi
          echo "✅ NOVITA_API_KEY present"

      # ──────────────────────────────────────────────────────────────
      # 6. CONFIGURE OPENCODE
      # ──────────────────────────────────────────────────────────────
      - name: Configure opencode (opencode.json + auth.json)
        env:
          NOVITA_API_KEY: ${{ secrets.NOVITA_API_KEY }}
          OC_MODEL: ${{ github.event.inputs.model }}
        run: |
          set -euo pipefail
          python3 << 'PYEOF'
          import os, json

          key   = os.environ["NOVITA_API_KEY"]
          model = os.environ.get("OC_MODEL", "novita/inclusionai/ling-2.6-1t")

          cfg = {
            "$schema": "https://opencode.ai/config.json",
            "model": model,
            "provider": {
              "novita": {
                "npm": "@ai-sdk/openai-compatible",
                "name": "Novita AI",
                "options": {
                  "baseURL": "https://api.novita.ai/openai/v1",
                  "apiKey": key
                },
                "models": {
                  "inclusionai/ling-2.6-1t": {
                    "name": "Ling 2.6 1T",
                    "limit": {"context": 131072, "output": 16384}
                  }
                }
              }
            },
            "mcp": {
              "playwright": {
                "enabled": True,
                "type": "local",
                "command": "npx",
                "args": [
                  "@playwright/mcp@latest",
                  "--headless", "--isolated",
                  "--no-sandbox", "--browser=chromium"
                ]
              },
              "fetch": {
                "enabled": True,
                "type": "local",
                "command": "uvx",
                "args": ["mcp-server-fetch"]
              }
            }
          }

          with open("opencode.json", "w") as f:
            json.dump(cfg, f, indent=2)

          safe = json.loads(json.dumps(cfg))
          if "novita" in safe.get("provider", {}):
              safe["provider"]["novita"]["options"]["apiKey"] = "***"
          print("=== opencode.json ===")
          print(json.dumps(safe, indent=2))

          auth_dir = os.path.expanduser("~/.local/share/opencode")
          os.makedirs(auth_dir, exist_ok=True)
          with open(f"{auth_dir}/auth.json", "w") as f:
            json.dump({"novita": {"type": "api", "key": key}}, f, indent=2)

          print("✅ opencode.json + auth.json written")
          PYEOF

      # ──────────────────────────────────────────────────────────────
      # 7. WRITE AGENTS.md
      # ──────────────────────────────────────────────────────────────
      - name: Write AGENTS.md (agent system context)
        run: |
          set -euo pipefail
          cat > AGENTS.md << 'EOF'
          # OmniForge — Hyper-Autonomous Engineering Agent

          ## Identity
          You are OmniForge, a world-class autonomous software engineering agent.
          You are a polyglot expert across every mainstream language and framework.
          You operate with ZERO human supervision.

          ## Non-negotiable rules
          1. NEVER produce stubs, TODOs, or placeholders.
          2. NEVER ask for clarification — infer intent and build.
          3. NEVER stop before validate.sh exits 0.
          4. ALWAYS verify library APIs with MCP tools before writing code.
          5. ALWAYS commit after each logical unit of work with: git add -A && git commit
          6. Every file you produce must be complete and production-ready.

          ## MCP tool protocol
          - Use Playwright MCP for reading official documentation and API surfaces.
          - Use Fetch MCP for raw package registry metadata.
          - Research BEFORE coding. Do not trust memory for API signatures.

          ## validate.sh contract
          The script at the repo root MUST be 100% self-contained and:
          - Install ALL dependencies.
          - Build or compile the project.
          - Run the complete test suite.
          - Run all applicable linters and static-analysis tools.
          - Exit 0 only when ALL prior steps pass.

          ## Output quality bar
          - Security: Validate all inputs, prevent injection, set secure headers.
          - Testing: Meaningful unit and integration tests — no trivial assertions.
          - Error handling: Structured logging, graceful degradation, user-friendly messages.
          - Documentation: README.md with setup, usage, and architecture overview.

          ## Git hygiene — CRITICAL
          After every file creation or modification, immediately run:
            git add -A && git commit -m "descriptive message"
          Do this frequently. Do not batch everything into one commit at the end.
          The CI pipeline does NOT gate on commit count — but frequent commits
          are required by your operating rules regardless.
          EOF
          echo "✅ AGENTS.md written"

      # ──────────────────────────────────────────────────────────────
      # 8. GIT BOOTSTRAP
      # ──────────────────────────────────────────────────────────────
      - name: Bootstrap git branch
        env:
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "omniforge/${RUN_ID}"
          git add -A
          git diff --cached --quiet \
            || git commit -m "chore: OmniForge bootstrap [skip ci]"
          echo "✅ Branch ready: omniforge/${RUN_ID}"

      # ──────────────────────────────────────────────────────────────
      # 9. OMNIFORGE AUTONOMOUS BUILD
      # ──────────────────────────────────────────────────────────────
      - name: OmniForge — Autonomous Build
        env:
          NOVITA_API_KEY: ${{ secrets.NOVITA_API_KEY }}
          TASK: ${{ github.event.inputs.task }}
        run: |
          set -euo pipefail
          opencode run --dir . "
          ## YOUR MISSION

          ${TASK}

          ## HOW TO EXECUTE (follow exactly, in order)

          ### STEP 1 — RESEARCH
          Before writing a single line of code, use your MCP tools to verify
          every library, package, framework, and API you plan to use.
          For each major dependency, navigate its official documentation, read
          the current stable version's API surface, and note exact class names,
          function signatures, and config keys. Do not trust memory — verify live.

          ### STEP 2 — IMPLEMENT
          Build the complete, production-grade solution. Standards:
          - COMPLETENESS: Every file complete. Zero stubs. Zero TODOs.
          - CORRECTNESS: Use the exact APIs you verified in STEP 1.
          - SECURITY: Validate and sanitise all user inputs. Enforce file size
            limits. Validate MIME types. Set secure HTTP headers.
          - TESTING: Write a comprehensive test suite covering unit logic,
            integration paths, edge cases, and error conditions.
          - LOGGING: Structured logging throughout — info for normal flow,
            warning for handled errors, error for unexpected failures.
          - DOCUMENTATION: README.md with purpose, setup instructions, usage
            guide, and a brief architecture overview.

          CRITICAL GIT RULE: After creating or modifying ANY file, immediately run:
            git add -A && git commit -m 'descriptive message here'
          Do this after EVERY logical chunk of work. Do not skip commits.

          ### STEP 3 — WRITE validate.sh
          Create validate.sh at the repo root. It must be entirely self-contained:
          1. Install ALL dependencies from scratch.
          2. Build or compile the project.
          3. Run the complete test suite — any single test failure must produce
             a non-zero exit code.
          4. Run all applicable linters and static analysis tools.
          5. Exit 0 only when every prior step passes without error.
          Commit immediately: git add -A && git commit -m 'add validate.sh'

          ### STEP 4 — RUN and FIX (The Autonomous Loop)
          1. Execute: bash validate.sh
          2. If it exits non-zero, read the full error output carefully.
             Research the root cause using MCP tools if needed.
             Apply a precise, targeted fix.
             Commit the fix: git add -A && git commit -m 'fix: <description>'
             Return to step 4.1.
          3. Repeat until validate.sh exits 0 with all tests and linters passing.
          4. After a clean exit: git add -A && git commit -m 'chore: all validation passing' || true

          ### STEP 5 — FINISH
          - Commit any remaining uncommitted changes:
              git add -A && git commit -m 'chore: final cleanup' || true
          - Output a concise summary: what was built, how to run it, how to
            run the tests, and any noteworthy implementation decisions.

          ## ABSOLUTE RULES
          - Do NOT ask questions. There is no human available to answer.
          - Do NOT stop early under any circumstances.
          - Do NOT produce placeholders, stubs, or TODO comments.
          - You have full unrestricted bash and shell access.
          - Read AGENTS.md for your full identity and operating rules.
          - COMMIT AFTER EVERY FILE. EVERY FIX. EVERY TIME. NO EXCEPTIONS.
          "

      # ──────────────────────────────────────────────────────────────
      # 10. CAPTURE ANY UNCOMMITTED AGENT WORK
      # ──────────────────────────────────────────────────────────────
      - name: Commit any uncommitted agent work
        run: |
          set -euo pipefail
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing uncommitted — agent committed everything cleanly ✅"
          else
            git commit -m "chore: capture uncommitted agent work"
            echo "✅ Captured and committed remaining agent changes"
          fi

      # ──────────────────────────────────────────────────────────────
      # 11. FINAL COLD VALIDATION
      # ──────────────────────────────────────────────────────────────
      - name: Final cold validation run
        run: |
          set -euo pipefail
          if [ ! -f validate.sh ]; then
            echo "::error::validate.sh does not exist — agent did not complete its task."
            exit 1
          fi
          chmod +x validate.sh
          echo "════════════ Running final validate.sh ════════════"
          ./validate.sh
          echo "════════════ validate.sh exited 0 ✅ ════════════"

      # ──────────────────────────────────────────────────────────────
      # 12. SAST (cppcheck & shellcheck)
      # ──────────────────────────────────────────────────────────────
      - name: Run Static Analysis Tools (SAST)
        if: always()
        run: |
          set -euo pipefail
          echo "--- Running SAST ---"
          if find . -not -path './.git/*' \( -name '*.c' -o -name '*.cpp' \) -print -quit | grep -q .; then
            echo "Running cppcheck..."
            find . -not -path './.git/*' \( -name '*.c' -o -name '*.cpp' \) -print0 \
              | xargs -0 cppcheck --enable=all --inline-suppr --error-exitcode=1 \
              || echo "::warning::cppcheck found issues."
          else
            echo "No C/C++ files found — skipping cppcheck."
          fi
          if find . -not -path './.git/*' -name '*.sh' -print -quit | grep -q .; then
            echo "Running shellcheck..."
            find . -not -path './.git/*' -name '*.sh' -print0 \
              | xargs -0 shellcheck --severity=warning \
              || echo "::warning::shellcheck found issues."
          else
            echo "No shell scripts found — skipping shellcheck."
          fi

      # ──────────────────────────────────────────────────────────────
      # 13. PUSH BRANCH + OPEN PR
      # ──────────────────────────────────────────────────────────────
      - name: Push branch and open pull request
        if: success()
        env:
          GH_TOKEN:          ${{ secrets.GITHUB_TOKEN }}
          TASK:              ${{ github.event.inputs.task }}
          RUN_ID:            ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          DEFAULT=$(git rev-parse --abbrev-ref origin/HEAD \
                    2>/dev/null | sed 's|origin/||' || echo "main")
          BRANCH="omniforge/${RUN_ID}"

          # Informational only — never used to gate anything
          AHEAD=$(git rev-list --count "origin/${DEFAULT}..HEAD" 2>/dev/null || echo "unknown")
          echo "ℹ️  Commits ahead of ${DEFAULT}: ${AHEAD}"

          git push -u origin "${BRANCH}"

          BODY_FILE=$(mktemp /tmp/pr-body-XXXXXX.md)
          export AHEAD BODY_FILE

          python3 - << 'PYEOF'
          import os

          run_id = os.environ["RUN_ID"]
          task   = os.environ["TASK"]
          server = os.environ["GITHUB_SERVER_URL"]
          repo   = os.environ["GITHUB_REPOSITORY"]
          ahead  = os.environ.get("AHEAD", "unknown")

          body = f"""## 🤖 OmniForge Autonomous Build Report

          | Field | Value |
          |---|---|
          | **Status** | ✅ Autonomous completion |
          | **Agent** | `opencode-ai` — headless `run` mode |
          | **Model** | `inclusionai/ling-2.6-1t` via Novita AI |
          | **Commits** | {ahead} beyond bootstrap |
          | **Validation** | `validate.sh` exits 0 ✅ |
          | **Run** | [{run_id}]({server}/{repo}/actions/runs/{run_id}) |

          ### Task
          ```
          {task}
          ```

          ---
          *Built entirely autonomously by OmniForge — zero human intervention* 🤖✨
          """

          body_file = os.environ["BODY_FILE"]
          with open(body_file, "w") as f:
              f.write(body)
          PYEOF

          TASK_SHORT=$(printf '%s' "${TASK}" | head -c 72)

          gh pr create \
            --title "🤖 OmniForge: ${TASK_SHORT}…" \
            --body-file "${BODY_FILE}" \
            --base  "${DEFAULT}" \
            --head  "${BRANCH}"

          rm -f "${BODY_FILE}"
          echo "✅ PR created for branch ${BRANCH}"
