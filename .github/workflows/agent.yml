name: AI Flask Project Generator

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install openai

      - name: Generate full Flask project via Responses API
        env:
          OPENAI_API_KEY: dummy
          OPENAI_BASE_URL: https://kemmlowww-glm-5-1.hf.space/v1
        run: |
          python << 'PY'
          import os, json, re
          from openai import OpenAI

          client = OpenAI(
              api_key=os.environ["OPENAI_API_KEY"],
              base_url=os.environ["OPENAI_BASE_URL"]
          )

          prompt = """
          Return ONLY valid JSON (no markdown).

          Create a small but useful Flask web app with:
          - modular structure
          - templates + static CSS
          - 2 routes: '/' and '/about'
          - clean readable code

          Output format:
          {
            "path/to/file": "content"
          }

          Required files:
          - app/__init__.py
          - app/routes.py
          - templates/index.html
          - templates/about.html
          - static/style.css
          - run.py
          - requirements.txt
          - README.md

          Requirements:
          - Flask app must run with python run.py
          - simple HTML UI
          - minimal but clean styling
          """

          resp = client.responses.create(
              model="kimi-k2.6",
              input=[{"role": "user", "content": prompt}]
          )

          text = resp.output_text.strip()

          # robust JSON extraction
          text = re.sub(r"```.*?```", "", text, flags=re.S)
          text = text[text.find("{"): text.rfind("}")+1]

          data = json.loads(text)

          for path, content in data.items():
              os.makedirs(os.path.dirname(path) or ".", exist_ok=True)
              with open(path, "w") as f:
                  f.write(content)

          print("Generated files:", list(data.keys()))
          PY

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ai/flask-full-app
          title: "AI: Full Flask Web App"
          body: |
            Generated a modular Flask web app using Responses API (Kimi proxy).

            Includes:
            - templates + styling
            - multiple routes
            - clean structure
          commit-message: "feat: generate full Flask app"
          add-paths: |
            app/**
            templates/**
            static/**
            run.py
            requirements.txt
            README.md
          delete-branch: true
