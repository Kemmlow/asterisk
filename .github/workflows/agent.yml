name: ASTERISK-V4.2.3-ULTRAPROD
on:
  workflow_dispatch:
    inputs:
      task:
        description: 'Heavy-Duty Objective'
        required: true
        default: 'Perform a full security audit of the repository and suggest Rust-based performance optimizations.'

jobs:
  run-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Pre-Warm MCP Cache & Tools
        run: |
          # Upgrade pip to stop the notice
          python -m pip install --upgrade pip
          pip install openai mcp-python-client python-dotenv
          
          # Warming the cache: we provide '.' as a dummy path for the FS server 
          # so it doesn't error out during the version check.
          npx --yes @playwright/mcp@latest --version
          npx --yes @modelcontextprotocol/server-github --version
          npx --yes @modelcontextprotocol/server-filesystem . --help
          npx --yes mcp-shell-server --version
          
          # Install browser binaries
          npx playwright install --with-deps chromium

      - name: Execute Production Cycle
        env:
          NOVITA_API_KEY: ${{ secrets.NOVITA_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MODEL_NAME: "inclusionai/ling-2.6-1t"
          AGENT_TASK: ${{ github.event.inputs.task }}
        run: python agent_main.py
