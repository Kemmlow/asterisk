name: Codex Flask PR (Kimi updated space)

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  codex:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Configure Codex for Kimi proxy
        run: |
          mkdir -p ~/.codex
          cat > ~/.codex/config.toml <<'EOF'
          model = "kimi-k2.6"
          model_provider = "kimi"
          approval_policy = "never"
          sandbox_mode = "workspace-write"

          [sandbox_workspace_write]
          network_access = true

          [model_providers.kimi]
          name = "Kimi Proxy"
          base_url = "https://kemmlowww-glm-5-1.hf.space/v1"
          env_key = "OPENAI_API_KEY"
          wire_api = "responses"
          EOF

      - name: Run Codex to generate Flask app
        env:
          OPENAI_API_KEY: dummy
        run: |
          codex exec "
          Create a minimal Flask app in the repository root.

          Requirements:
          - write app.py in the root
          - app.py must use Flask
          - route '/' must return 'Hello from Codex'
          - write requirements.txt with only flask
          - do not add extra files
          - keep the code minimal and clean
          "

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: codex/flask-app
          title: "Codex: add minimal Flask app"
          body: |
            Generated with Codex CLI using the custom Kimi proxy provider.
            The workflow uses the updated Space and the Responses API.
          commit-message: "feat: add minimal Flask app"
          delete-branch: true
