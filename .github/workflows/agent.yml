name: Cline Flask PR

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  cline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Cline CLI
        run: npm install -g cline

      - name: Set Cline workspace dir
        run: |
          echo "CLINE_DIR=$RUNNER_TEMP/cline" >> "$GITHUB_ENV"

      - name: Auth Cline to updated Kimi proxy
        run: |
          cline auth \
            -p openai \
            -k dummy \
            -m kimi-k2.6 \
            -b https://kemmlowww-glm-5-1.hf.space/v1

      - name: Add Cline rules for this task
        run: |
          mkdir -p .clinerules
          cat > .clinerules/00-flask-task.md <<'EOF'
          # Flask app task rules

          - Create only these files in the repo root:
            - app.py
            - requirements.txt
          - app.py must use Flask and return "Hello from Codex" on route "/"
          - requirements.txt must contain only:
            flask
          - Do not add extra files.
          - Do not run tests.
          - When the task is complete, call attempt_completion with a non-empty result string.
          EOF

      - name: Run Cline
        run: |
          cline -y -c "$GITHUB_WORKSPACE" "
          Create a minimal Flask app in the repository root.

          Requirements:
          - write app.py in the root
          - app.py must use Flask
          - route '/' must return 'Hello from Codex'
          - write requirements.txt with only flask
          - do not add extra files
          - keep the code minimal and clean
          - when finished, call attempt_completion with result='Created app.py and requirements.txt'
          "

      - name: Commit changes
        run: |
          git config user.name "cline-bot"
          git config user.email "cline@users.noreply.github.com"
          git checkout -b cline/flask-app
          git add app.py requirements.txt .clinerules/00-flask-task.md
          git commit -m "feat: add minimal Flask app via Cline" || echo "No changes"

      - name: Push branch
        run: git push origin cline/flask-app || echo "Push skipped"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: cline/flask-app
          title: "Cline: add minimal Flask app"
          body: |
            Generated with Cline CLI using the updated Kimi proxy and workspace rules.
          commit-message: "feat: add minimal Flask app"
          delete-branch: true
