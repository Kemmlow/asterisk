name: OPENHANDS-MCP-PROD
on:
  workflow_dispatch:
    inputs:
      task:
        description: 'Mission Objective'
        required: true
        default: 'Audit this repo and create a summary PR.'

jobs:
  execute:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Install uv & Tools
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          npm install -g @playwright/mcp @modelcontextprotocol/server-github @modelcontextprotocol/server-filesystem mcp-shell-server
          npx playwright install --with-deps chromium

      - name: Run Agent
        env:
          LLM_API_KEY: ${{ secrets.NOVITA_API_KEY }}
          LLM_BASE_URL: "https://api.novita.ai/openai"
          LLM_MODEL: "novita/${{ vars.MODEL_NAME }}"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AGENT_TASK: ${{ github.event.inputs.task }}
        run: |
          uv pip install --system openhands-sdk openhands-tools
          python agent_main.py