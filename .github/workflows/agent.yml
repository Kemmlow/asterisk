name: OPENHANDS-PROD-SUCCESS
on:
  workflow_dispatch:
    inputs:
      task:
        description: 'Mission'
        required: true
        default: 'Build the Flask converter app per PROMPT.md'

jobs:
  execute:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Environment
        run: |
          # Install uv
          curl -LsSf https://astral.sh/uv/install.sh | sh
          # Create and activate Virtual Environment
          uv venv .venv
          echo "VIRTUAL_ENV=.venv" >> $GITHUB_ENV
          echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH

      - name: Install Dependencies
        run: |
          uv pip install openhands-sdk openhands-tools

      - name: Run Agent
        env:
          LLM_API_KEY: ${{ secrets.NOVITA_API_KEY }}
          LLM_BASE_URL: "https://api.novita.ai/openai"
          # Handles blank vars gracefully
          LLM_MODEL: "novita/${{ vars.MODEL_NAME || 'ling-2.6-1t' }}"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AGENT_TASK: ${{ github.event.inputs.task }}
        run: python agent_main.py
        
