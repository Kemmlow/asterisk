name: "Forge: Create from Scratch"

on:
  workflow_dispatch:
    inputs:
      task_description:
        description: 'Target Build Task'
        required: true
        default: 'Write a prod grade crypter in cpp 20, with super duper huper level brilliance accuracy, ZERO BREVITY, ZERO EXAMPLE/CONCEPTUAL CODE, ONLY REAL WORLD HYPER COMPLEX BEST CODE'

jobs:
  build_from_scratch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Encode and Load Prompt
        id: load_step
        run: |
          # Encode PROMPT.md to Base64 to bypass Bash syntax errors (parentheses/special chars)
          if [ -f PROMPT.md ]; then
            ENCODED_PROMPT=$(base64 -w 0 PROMPT.md)
            echo "PROMPT_B64=$ENCODED_PROMPT" >> $GITHUB_ENV
          else
            echo "PROMPT_B64=$(echo -n 'Act as a Senior C++ Engineer.' | base64 -w 0)" >> $GITHUB_ENV
          fi
      - name: Run OpenHands
        run: |
          DECODED_PROMPT=$(echo "${{ env.PROMPT_B64 }}" | base64 -d)
          
          docker run --rm \
            --user root \
            -v $(pwd):/opt/workspace_base \
            -e LLM_API_KEY=${{ secrets.NOVITA_API_KEY }} \
            -e LLM_BASE_URL="https://api.novita.ai/openai" \
            -e LLM_MODEL="openai/inclusionai/ling-2.6-1t" \
            -e WORKSPACE_BASE="/opt/workspace_base" \
            -e GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} \
            -e RUNTIME=process \
            ghcr.io/openhands/openhands:latest \
            python3 -m openhands.core.main \
            -t "${{ github.event.inputs.task_description }}" \
            -d /opt/workspace_base \
            -i 300
