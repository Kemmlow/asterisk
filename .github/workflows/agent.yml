name: ASTERISK-V4.2 PROD Cycle
on:
  workflow_dispatch:
    inputs:
      task:
        description: 'Goal'
        required: true
        default: 'Scan repo for technical debt and create an optimization PR.'

jobs:
  run-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: '20'}
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}

      - name: Install Dependencies
        run: |
          pip install openai mcp-python-client python-dotenv
          npm install -g @playwright/mcp@latest mcp-shell-server @modelcontextprotocol/server-github @modelcontextprotocol/server-filesystem
          npx playwright install --with-deps chromium

      - name: Execute
        env:
          NOVITA_API_KEY: ${{ secrets.NOVITA_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MODEL_NAME: "inclusionai/ling-2.6-1t"
          AGENT_TASK: ${{ github.event.inputs.task }}
        run: python agent_main.py
