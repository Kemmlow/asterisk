# ╔══════════════════════════════════════════════════════════════════╗
# ║                    KawaiiForge: Autonomous AI Builder           ║
# ║  • Replaced aider with opencode-ai (true autonomous agent)     ║
# ║  • opencode run = headless non-interactive CI mode              ║
# ║  • Custom OpenAI-compatible provider via opencode.json          ║
# ║  • Playwright MCP + Fetch MCP built into opencode natively      ║
# ║  • 3-hour timeout, ling-2.6-1t via Novita AI                   ║
# ╚══════════════════════════════════════════════════════════════════╝

name: "KawaiiForge: Autonomous AI Builder"

on:
  workflow_dispatch:
    inputs:
      task_description:
        description: "Task for KawaiiForge"
        required: true
        default: >-
          Build a production-grade Flask web application that converts files
          bidirectionally between CSV, XLSX, XLS, and DBF formats.
          Target users: elderly staff. Style: cute, clean, unique, creative kawaii
          aesthetic (pastel pinks, blues, lavenders, sakura motifs, big friendly
          buttons with cute animal/flower icons, extremely large fonts, high
          contrast, simple 3-step wizard interface, drag-and-drop, clear large-text
          instructions, joyful and non-intimidating UI). Must be extremely easy to use.
          Production quality: proper security (sanitize uploads), error handling,
          logging, tests, accessibility (ARIA, keyboard nav), responsive design.
          Use best modern practices. ZERO stubs, ZERO TODOs, full implementation only.
      max_fix_iterations:
        description: "Maximum validation-fix cycles"
        required: false
        default: "25"

concurrency:
  group: kawaiiforge-${{ github.ref }}
  cancel-in-progress: false

jobs:
  kawaiiforge:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: write

    steps:
      # ─────────────────────────────────────────────
      # 1. CHECKOUT
      # ─────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ─────────────────────────────────────────────
      # 2. RUNTIMES
      # ─────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ─────────────────────────────────────────────
      # 3. SYSTEM DEPENDENCIES
      #    Ubuntu 24.04 Y2038 renames applied.
      # ─────────────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build \
            libssl-dev libsodium-dev \
            cppcheck \
            libnss3 \
            libatk1.0-0t64 \
            libatk-bridge2.0-0t64 \
            libcups2t64 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libgbm1 \
            libasound2t64 \
            golang-go rustc cargo default-jdk

      # ─────────────────────────────────────────────
      # 4. INSTALL OPENCODE + PLAYWRIGHT MCP
      #
      #    opencode-ai  → the correct npm package name
      #    @playwright/mcp → MCP server opencode uses
      #    uvx / mcp-server-fetch → second MCP server
      #
      #    Playwright browsers installed for BOTH:
      #      npx  → @playwright/mcp server
      #      python -m playwright → fallback scraping
      # ─────────────────────────────────────────────
      - name: Install opencode and tooling
        run: |
          pip install -q --upgrade pip
          pip install -q uv playwright

          # opencode: the autonomous agent replacing aider
          npm install -g opencode-ai@latest

          # MCP servers opencode will use for research
          npm install -g @playwright/mcp@latest

          # Chromium for both MCP server and python playwright
          npx playwright install chromium --with-deps
          python -m playwright install chromium --with-deps

          echo "=== Versions ==="
          opencode --version || true
          node --version
          python --version

      # ─────────────────────────────────────────────
      # 5. ATOMIC BOOTSTRAP
      #    ONE shell — strict order:
      #      A) git config + checkout -b
      #      B) write opencode.json config
      #      C) write AGENTS.md (opencode's native
      #         instruction file, auto-loaded)
      #      D) write KAWAII_PROMPT.md (full mission)
      #      E) pre-authorise the Novita provider
      #         (write auth.json directly — defence
      #          against the known bug where options
      #          are not forwarded to API calls)
      #      F) git add + commit
      # ─────────────────────────────────────────────
      - name: Bootstrap — branch, write files, commit
        env:
          TASK:           ${{ github.event.inputs.task_description }}
          MAX_ITERATIONS: ${{ github.event.inputs.max_fix_iterations }}
          RUN_ID:         ${{ github.run_id }}
          NOVITA_API_KEY: ${{ secrets.NOVITA_API_KEY }}
        run: |
          # ── A) Git ─────────────────────────────────────────────────
          git config user.name  "kawaiiforge-bot"
          git config user.email "kawaiiforge@ci.local"
          git checkout -b "kawaiiforge/${RUN_ID}"

          # ── B) opencode.json ────────────────────────────────────────
          # Configures:
          #   • Novita AI as a custom OpenAI-compatible provider
          #   • ling-2.6-1t as the model for the build agent
          #   • Playwright MCP + Fetch MCP servers
          #   • Full bash permissions (required for autonomous build)
          #   • Auto-compact on to handle long sessions
          #
          # DEFENCE against options-not-forwarded bug (#5674):
          #   apiKey is set BOTH inside options{} AND via auth.json
          #   (written in step E below).
          cat > opencode.json << OCJSON_EOF
          {
            "\$schema": "https://opencode.ai/config.json",
            "model": "novita/inclusionai/ling-2.6-1t",
            "provider": {
              "novita": {
                "npm": "@ai-sdk/openai-compatible",
                "name": "Novita AI",
                "options": {
                  "baseURL": "https://api.novita.ai/openai/v1",
                  "apiKey": "${NOVITA_API_KEY}"
                },
                "models": {
                  "inclusionai/ling-2.6-1t": {
                    "name": "Ling 2.6 1T",
                    "limit": {
                      "context": 131072,
                      "output": 16384
                    }
                  }
                }
              }
            },
            "mcp": {
              "playwright": {
                "command": "npx",
                "args": [
                  "@playwright/mcp@latest",
                  "--headless",
                  "--isolated",
                  "--no-sandbox",
                  "--browser=chromium"
                ]
              },
              "fetch": {
                "command": "uvx",
                "args": ["mcp-server-fetch"]
              }
            },
            "autoshare": false,
            "autocompact": true
          }
          OCJSON_EOF
          echo "=== opencode.json written ==="
          cat opencode.json

          # ── C) AGENTS.md ────────────────────────────────────────────
          # opencode auto-loads AGENTS.md as the system context.
          # This is the canonical way to give persistent instructions.
          cat > AGENTS.md << 'AGENTS_EOF'
          # KawaiiForge Agent Instructions

          You are KawaiiForge — a world-class, gentle, and extremely thorough
          full-stack engineer who specialises in joyful, accessible,
          production-grade software.

          ## Core identity
          Your signature style is "kawaii engineering": clean, cute, empathetic
          interfaces combined with rock-solid, secure, well-tested backend code.

          ## Absolute rules
          - NEVER use placeholders, TODOs, stubs, or abbreviated code.
          - NEVER stop mid-task or ask for permission.
          - NEVER summarise instead of implementing.
          - Every file you produce must be complete and ready for production.
          - Always verify library APIs with MCP tools before writing code.

          ## Tool usage
          - Use the playwright MCP tool to navigate documentation sites and
            confirm exact API signatures before using any library.
          - Use the fetch MCP tool to retrieve raw package metadata from
            package registries using real package names only.
          - Never construct URLs with angle-bracket placeholders.
          AGENTS_EOF

          # ── D) KAWAII_PROMPT.md ─────────────────────────────────────
          # Written via a /tmp Python script to avoid heredoc nesting.
          cat > /tmp/gen_prompt.py << 'PYSCRIPT_EOF'
          import os, textwrap

          task     = os.environ["TASK"]
          max_iter = os.environ["MAX_ITERATIONS"]

          prompt = textwrap.dedent(f"""
          # KawaiiForge Mission

          ## Task
          {task}

          ## Autonomous Agent Protocol

          You are a fully autonomous software-engineering agent capable of
          working in ANY programming language and framework.

          ### PHASE 1 — RESEARCH
          Before writing any code, use MCP tools to verify every library,
          API, and configuration option you plan to use.

          Playwright MCP (browser_navigate, browser_snapshot, browser_click):
            - Search DuckDuckGo for each dependency.
            - Navigate to official documentation sites.
            - Read the current API surface and confirm exact class names,
              function signatures, and parameter names.
            - Check package registries for current stable versions.

          Fetch MCP:
            - Retrieve raw package metadata from package registries using
              real package names only (never angle-bracket placeholders).

          Never assume or hallucinate — verify every detail before coding.

          ### PHASE 2 — IMPLEMENT
          Produce a complete, production-grade project:
          - All source files with zero stubs, zero TODOs, zero placeholders.
          - Correct build system for the chosen stack.
          - Comprehensive automated test suite.
          - Security: sanitise all inputs, limit upload sizes, set secure
            headers, prevent path traversal.
          - Full structured logging and error handling throughout.
          - Accessibility: ARIA labels, keyboard nav, skip-links,
            high-contrast colours, minimum 18pt body font.
          - Kawaii UI (when the task involves a user interface):
            pastel pinks, blues, lavenders, sakura motifs, large friendly
            buttons with cute SVG animal/flower icons, 3-step wizard flow,
            drag-and-drop with clear visual feedback, joyful copy that
            never intimidates elderly users.

          ### PHASE 3 — validate.sh
          Create or update validate.sh at the repo root that:
            1. Installs and syncs all dependencies.
            2. Compiles or builds the project.
            3. Runs every test suite.
            4. Runs linters and static-analysis tools.
            5. Exits 0 only when every prior step passes.
          The script must be fully self-contained — CI runs it cold.

          ### PHASE 4 — RUN
          Execute: bash validate.sh

          ### PHASE 5 — FIX LOOP
          If validate.sh exits non-zero:
          - Read every error line carefully.
          - Research the root cause with MCP tools if needed.
          - Apply a precise surgical fix.
          - Commit with a descriptive message.
          - Return to PHASE 4.

          Repeat until validate.sh exits 0.
          Do NOT summarise. Do NOT ask for permission. Do NOT stop early.
          Max validation-fix cycles: {max_iter}
          """).strip()

          with open("KAWAII_PROMPT.md", "w") as fh:
              fh.write(prompt + "\n")
          print(f"KAWAII_PROMPT.md: {len(prompt)} chars, {len(prompt.splitlines())} lines")
          PYSCRIPT_EOF
          python3 /tmp/gen_prompt.py
          rm /tmp/gen_prompt.py

          # ── E) Pre-authorise Novita provider ───────────────────────
          # Write auth.json directly so the API key is picked up even
          # if the opencode.json options{} forwarding bug is present.
          mkdir -p "${HOME}/.local/share/opencode"
          cat > "${HOME}/.local/share/opencode/auth.json" << AUTHJSON_EOF
          {
            "novita": {
              "type": "api",
              "key": "${NOVITA_API_KEY}"
            }
          }
          AUTHJSON_EOF
          echo "auth.json written (key redacted):"
          cat "${HOME}/.local/share/opencode/auth.json" \
            | sed 's/"key": ".*"/"key": "[REDACTED]"/'

          # ── F) Stage and commit ─────────────────────────────────────
          git add README.md opencode.json AGENTS.md KAWAII_PROMPT.md
          git diff --cached --quiet \
            || git commit -m "chore: KawaiiForge bootstrap [skip ci]"

          echo ""
          echo "=== Bootstrap complete ==="
          git log --oneline -5
          ls -lah

      # ─────────────────────────────────────────────
      # 6. KAWAIIFORGE AUTONOMOUS BUILD LOOP
      #
      #    opencode run  = fully non-interactive mode
      #    --file        = attach prompt file to session
      #    -q            = quiet (no spinner in CI logs)
      #
      #    AGENTS.md is auto-loaded by opencode as the
      #    system prompt — no extra flag needed.
      #    opencode.json is auto-loaded from CWD.
      # ─────────────────────────────────────────────
      - name: KawaiiForge — Autonomous Build Loop
        env:
          NOVITA_API_KEY: ${{ secrets.NOVITA_API_KEY }}
        run: |
          opencode run \
            --file KAWAII_PROMPT.md \
            -q \
            "Execute the full autonomous agent protocol in KAWAII_PROMPT.md.
             Read AGENTS.md for your persona and rules.
             Do not stop until validate.sh exits 0."

      # ─────────────────────────────────────────────
      # 7. VERIFY AGENT PRODUCED COMMITS
      # ─────────────────────────────────────────────
      - name: Verify agent produced commits
        run: |
          COMMITS_AHEAD=$(git rev-list --count origin/main..HEAD 2>/dev/null || echo 0)
          echo "Commits ahead of main: ${COMMITS_AHEAD}"
          if [ "${COMMITS_AHEAD}" -le 1 ]; then
            echo "::error::KawaiiForge produced no meaningful commits beyond bootstrap."
            exit 1
          fi

      # ─────────────────────────────────────────────
      # 8. FINAL COLD VALIDATION RUN
      # ─────────────────────────────────────────────
      - name: Final validation run
        run: |
          if [ ! -f "validate.sh" ]; then
            echo "::error::validate.sh was not created by the agent."
            exit 1
          fi
          chmod +x validate.sh
          echo "════════════ Running final validate.sh ════════════"
          ./validate.sh
          echo "════════════ validate.sh exited 0 ✅ ════════════"

      # ─────────────────────────────────────────────
      # 9. OPTIONAL SAST (C/C++ only)
      # ─────────────────────────────────────────────
      - name: SAST — cppcheck (C/C++ projects only)
        if: always()
        run: |
          CPP_FILES=$(find . \
            -not -path './.git/*' \
            \( -name '*.cpp' -o -name '*.cxx' \
               -o -name '*.h'  -o -name '*.hpp' \) \
            2>/dev/null || true)
          if [ -n "$CPP_FILES" ]; then
            echo "Running cppcheck..."
            # shellcheck disable=SC2086
            cppcheck \
              --enable=warning,style,performance,portability \
              --std=c++20 \
              --suppress=missingIncludeSystem \
              --error-exitcode=1 \
              --inline-suppr \
              $CPP_FILES \
              || echo "::warning::cppcheck issues found."
          else
            echo "No C/C++ files found — skipping cppcheck."
          fi

      # ─────────────────────────────────────────────
      # 10. SHIP — PUSH BRANCH & OPEN PR
      # ─────────────────────────────────────────────
      - name: Push branch and open pull request
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="kawaiiforge/${{ github.run_id }}"
          git push -u origin "$BRANCH"

          TASK_SHORT=$(echo "${{ github.event.inputs.task_description }}" \
                       | cut -c1-80)

          gh pr create \
            --title "🌸 KawaiiForge: ${TASK_SHORT}…" \
            --body "## 🌸 KawaiiForge Autonomous Build Report

          | Field | Value |
          |-------|-------|
          | **Status** | ✅ Fully autonomous completion |
          | **Agent** | opencode-ai (non-interactive \`run\` mode) |
          | **Model** | \`inclusionai/ling-2.6-1t\` via Novita AI |
          | **MCP** | \`@playwright/mcp\` (Chromium) + \`mcp-server-fetch\` |
          | **Instructions** | \`AGENTS.md\` + \`KAWAII_PROMPT.md\` |
          | **Validation** | Autonomous fix loop until \`validate.sh\` exits 0 |
          | **Run** | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

          ### Task
          \`\`\`
          ${{ github.event.inputs.task_description }}
          \`\`\`

          ---
          Built with ❤️ by KawaiiForge — powerful software, adorable delivery 🌸" \
            --base main \
            --head "$BRANCH"
