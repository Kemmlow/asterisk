name: Codex Flask PR (v0.80 + Proxy)

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  codex:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Codex CLI (stable old)
        run: npm install -g @openai/codex@0.80.0

      - name: Generate Flask app via your API
        env:
          OPENAI_API_KEY: dummy
          OPENAI_BASE_URL: https://kemmlowww-glm-5-1.hf.space/v1
        run: |
          codex exec "
          Create a minimal Flask app in the root directory:
          - app.py with Flask
          - route '/' returns 'Hello from Codex'
          - requirements.txt with flask only
          - no extra explanation
          "

      - name: Commit changes
        run: |
          git config user.name "codex-bot"
          git config user.email "codex@users.noreply.github.com"
          git checkout -b codex/flask-app
          git add .
          git commit -m "feat: add Flask app via Codex proxy" || echo "No changes"

      - name: Push branch
        run: git push origin codex/flask-app || echo "Push skipped"

      - name: Create PR
        uses: peter-evans/create-pull-request@v6
        with:
          branch: codex/flask-app
          title: "Codex: Flask app via proxy"
          body: "Generated using Codex CLI v0.80 with custom API"
