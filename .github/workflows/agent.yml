name: "Forge: OpenClaw + Novita AI"

on:
  workflow_dispatch:
    inputs:
      task_description:
        description: 'Target Build Task'
        required: true
        default: 'Write a prod grade crypter in cpp 20, with super duper huper level brilliance accuracy, ZERO BREVITY, ZERO EXAMPLE/CONCEPTUAL CODE, ONLY REAL WORLD HYPER COMPLEX BEST CODE'

jobs:
  forge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install OpenClaw + Build Tools
        run: |
          npm install -g openclaw
          sudo apt-get update -qq
          sudo apt-get install -y build-essential cmake ninja-build libssl-dev

      - name: Configure Git
        run: |
          git config user.name "openclaw-forge"
          git config user.email "forge@ci.local"

      - name: Run OpenClaw Agent
        env:
          OPENAI_API_KEY: ${{ secrets.NOVITA_API_KEY }}
          OPENAI_BASE_URL: "https://api.novita.ai/openai/"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SYSTEM_PROMPT=$(cat PROMPT.md 2>/dev/null || echo "You are an elite Senior C++ Engineer.")
          
          openclaw \
            --model "inclusionai/ling-2.6-1t" \
            --yes \
            --message "$SYSTEM_PROMPT

          TASK: ${{ github.event.inputs.task_description }}

          Rules:
          - Use the exact style and requirements from PROMPT.md
          - Build the project with cmake + ninja
          - Fix all errors until it compiles cleanly
          - Commit all changes with clear messages
          - Push to a new branch
          - Create a Pull Request automatically"
