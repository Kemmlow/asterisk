name: Codex Flask PR (Kimi Proxy FIXED)

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  codex:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Codex CLI (stable old)
        run: npm install -g @openai/codex@0.80.0

      # 🔥 CRITICAL STEP — create config.toml
      - name: Configure Codex to use YOUR API (chat mode)
        run: |
          mkdir -p ~/.codex
          cat > ~/.codex/config.toml << 'EOF'
          model = "kimi-k2.6"
          model_provider = "kimi"

          [model_providers.kimi]
          name = "Kimi Proxy"
          base_url = "https://kemmlowww-glm-5-1.hf.space/v1"
          env_key = "OPENAI_API_KEY"
          wire_api = "chat"
          EOF

      - name: Run Codex (forced chat mode)
        env:
          OPENAI_API_KEY: dummy
        run: |
          codex exec "
          Create a minimal Flask app in the root directory:
          - app.py with Flask
          - route '/' returns 'Hello from Codex'
          - requirements.txt with flask only
          - no extra explanation
          "

      - name: Commit changes
        run: |
          git config user.name "codex-bot"
          git config user.email "codex@users.noreply.github.com"
          git checkout -b codex/flask-app
          git add .
          git commit -m "feat: add Flask app via Kimi proxy" || echo "No changes"

      - name: Push branch
        run: git push origin codex/flask-app || echo "Push skipped"

      - name: Create PR
        uses: peter-evans/create-pull-request@v6
        with:
          branch: codex/flask-app
          title: "Codex: Flask app via Kimi proxy"
          body: "Generated using Codex CLI + custom Kimi API"
