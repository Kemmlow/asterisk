name: ASTERISK-V4.2.3-ULTRAPROD
on:
  workflow_dispatch:
    inputs:
      task:
        description: 'Heavy-Duty Objective'
        required: true
        default: 'Perform a full security audit of the repository and suggest Rust-based performance optimizations.'

jobs:
  run-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install & Pre-Warm Tools
        run: |
          # 1. Upgrade Python environment
          python -m pip install --upgrade pip
          pip install openai mcp-python-client python-dotenv
          
          # 2. Pre-install MCP servers globally 
          # This ensures npx finds them instantly without running them/crashing.
          npm install -g @playwright/mcp @modelcontextprotocol/server-github @modelcontextprotocol/server-filesystem mcp-shell-server
          
          # 3. Setup Playwright browsers
          npx playwright install --with-deps chromium

      - name: Execute Production Cycle
        env:
          NOVITA_API_KEY: ${{ secrets.NOVITA_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MODEL_NAME: "inclusionai/ling-2.6-1t"
          AGENT_TASK: ${{ github.event.inputs.task }}
        run: python agent_main.py
