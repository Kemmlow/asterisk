name: ASTERISK-V4.2.1-FIX
on:
  workflow_dispatch:
    inputs:
      task:
        description: 'Goal'
        required: true
        default: 'Research trillionaire predictions and create a PR with the findings.'

jobs:
  run-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: '20'}
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}

      - name: Install and Pre-Link MCP
        run: |
          pip install openai mcp-python-client python-dotenv
          sudo npm install -g @playwright/mcp@latest mcp-shell-server @modelcontextprotocol/server-github @modelcontextprotocol/server-filesystem
          # Pre-linking bypasses NPX lookup hangups
          sudo ln -s $(which mcp-server-github) /usr/local/bin/mcp-server-github
          sudo ln -s $(which mcp-server-filesystem) /usr/local/bin/mcp-server-filesystem
          sudo ln -s $(which mcp-shell-server) /usr/local/bin/mcp-shell-server
          sudo ln -s $(which playwright-mcp) /usr/local/bin/playwright-mcp
          npx playwright install --with-deps chromium

      - name: Execute
        env:
          NOVITA_API_KEY: ${{ secrets.NOVITA_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MODEL_NAME: "inclusionai/ling-2.6-1t"
          AGENT_TASK: ${{ github.event.inputs.task }}
        run: python agent_main.py
