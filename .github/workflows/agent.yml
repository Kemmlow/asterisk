# ╔══════════════════════════════════════════════════════════════════╗
# ║              Forge: Aider + Novita AI  (v3 — unlimited)         ║
# ║  • 3-hour hard ceiling                                           ║
# ║  • Zero token limits (unlimited Novita API)                      ║
# ║  • ling-2.6-1t hardcoded                                         ║
# ║  • Brave Search MCP + mcp-server-fetch for grounding             ║
# ║  • SAST lint gate (cppcheck) before PR                           ║
# ╚══════════════════════════════════════════════════════════════════╝
name: "Forge: Aider + Novita AI"

on:
  workflow_dispatch:
    inputs:
      task_description:
        description: 'Target Build Task'
        required: true
        default: >-
          Write a prod-grade AES-256-GCM + ChaCha20-Poly1305 dual-cipher
          crypter in C++20. ZERO brevity. ZERO stubs. ONLY complete,
          production-quality, real-world hyper-complex best code.
      max_fix_iterations:
        description: 'Max build-fix loops before giving up'
        required: false
        default: '20'

# ── Only one forge run per branch at a time ───────────────────────
concurrency:
  group: forge-${{ github.ref }}
  cancel-in-progress: false

jobs:
  forge:
    runs-on: ubuntu-latest
    timeout-minutes: 180          # ← 3 hours hard ceiling
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: write

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Python 3.12 ──────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ── 3. Node 20 (required for npx MCP servers) ────────────────
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 4. System deps + build toolchain ────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build \
            libssl-dev libsodium-dev \
            cppcheck

      # ── 5. Python deps ──────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          pip install -q --upgrade pip
          pip install -q aider-chat uv

      # ── 6. Pre-warm MCP packages ─────────────────────────────────
      - name: Pre-warm Brave Search MCP
        if: ${{ secrets.BRAVE_API_KEY != '' }}
        env:
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
        run: |
          npx -y @modelcontextprotocol/server-brave-search --help 2>/dev/null || true

      # ── 7. Validate secrets ──────────────────────────────────────
      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.NOVITA_API_KEY }}" ]; then
            echo "::error::NOVITA_API_KEY is not set. Aborting."
            exit 1
          fi
          if [ -z "${{ secrets.BRAVE_API_KEY }}" ]; then
            echo "::warning::BRAVE_API_KEY not set — Brave Search MCP disabled, fetch-only mode active."
          else
            echo "::notice::Brave Search MCP + fetch MCP both enabled."
          fi

      # ── 8. Write .aider.mcp.json ─────────────────────────────────
      - name: Write .aider.mcp.json
        env:
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
        run: |
          if [ -n "$BRAVE_API_KEY" ]; then
            cat > .aider.mcp.json << EOF
          {
            "mcpServers": {
              "brave-search": {
                "command": "npx",
                "args": ["-y", "@modelcontextprotocol/server-brave-search"],
                "env": {
                  "BRAVE_API_KEY": "$BRAVE_API_KEY"
                }
              },
              "fetch": {
                "command": "uvx",
                "args": ["mcp-server-fetch"]
              }
            }
          }
          EOF
          else
            cat > .aider.mcp.json << 'EOF'
          {
            "mcpServers": {
              "fetch": {
                "command": "uvx",
                "args": ["mcp-server-fetch"]
              }
            }
          }
          EOF
          fi
          echo "--- .aider.mcp.json ---"
          cat .aider.mcp.json

      # ── 9. Forge ─────────────────────────────────────────────────
      - name: Forge (Aider autonomous build loop)
        env:
          OPENAI_API_KEY:  ${{ secrets.NOVITA_API_KEY }}
          OPENAI_API_BASE: "https://api.novita.ai/openai/v1"
          BRAVE_API_KEY:   ${{ secrets.BRAVE_API_KEY }}
          MAX_ITERATIONS:  ${{ github.event.inputs.max_fix_iterations }}
          TASK:            ${{ github.event.inputs.task_description }}
        run: |
          set -euo pipefail

          git config user.name  "forge-bot"
          git config user.email "forge@ci.local"
          git checkout -b "forge/${{ github.run_id }}"

          # ── Persona (repo PROMPT.md wins, safe fallback otherwise) ─
          SKILL=$(cat PROMPT.md 2>/dev/null || cat << 'SKILL_EOF'
          You are a world-class C++20 systems engineer with 20 years of
          cryptography and OS-level programming experience.
          You write ONLY complete, compilable, production-grade code.
          You NEVER write pseudo-code, TODOs, stubs, or placeholder comments.
          You verify every API signature before using it via MCP web search.
          SKILL_EOF
          )

          # Seed file so aider always has a repo target
          touch forge_output.cpp
          git add forge_output.cpp

          aider \
            --model "openai/inclusionai/ling-2.6-1t" \
            --yes-always \
            --auto-commits \
            --no-auto-lint \
            --no-stream \
            --message "$SKILL

          ════════════════════════════════════════════════════════════
          TASK  : $TASK
          ════════════════════════════════════════════════════════════

          ██████████████ MCP TOOL USAGE — MANDATORY ██████████████████
          You have TWO MCP servers connected and active right now:

            ① brave-search  → call brave_web_search to look up:
                - Any C++ stdlib or library API you are not 100% sure of
                - OpenSSL EVP docs, libsodium crypto_aead_* docs
                - Compiler error messages you cannot immediately explain
                - CMake find_package() module names
                - CVE / security advisories for every algorithm used

            ② fetch  → call fetch_url to pull exact content from:
                - https://en.cppreference.com  (any page)
                - https://docs.openssl.org
                - https://libsodium.gitbook.io

          ── MANDATORY SEARCH-BEFORE-CODE PROTOCOL ───────────────────
          BEFORE writing ANY function call you are not 100% certain of:
            Step 1 → brave_web_search('<function> cppreference')
            Step 2 → fetch_url(<top result URL>)
            Step 3 → Read the exact signature from the fetched page
            Step 4 → ONLY then write the code using that verified signature

          NEVER invent function signatures, enum values, struct members,
          macro names, or template parameters.
          If search returns nothing → use the safest known alternative
          and document exactly why in a code comment.

          ████████████ AUTONOMOUS EXECUTION CONTRACT ██████████████████
          YOU ARE IN FULLY AUTONOMOUS MODE.
          THE API HAS NO TOKEN LIMIT — write every file in full,
          every function completely, every code path explicitly.
          DO NOT abbreviate. DO NOT ask for confirmation.
          DO NOT summarise progress. DO NOT add TODO comments.

          ── PHASE 1 · RESEARCH ───────────────────────────────────────
          • Search for the current stable API of every library you will use
          • Verify CMake find_package() module names and target names
          • Check for any deprecated APIs and find their modern replacements
          • Only proceed to PHASE 2 after all APIs are confirmed

          ── PHASE 2 · IMPLEMENT ──────────────────────────────────────
          • Write EVERY file in full: all headers, all sources, CMakeLists.txt
          • C++20 throughout: RAII, smart pointers, std::expected, concepts,
            ranges, std::span, std::string_view — no raw owning pointers
          • Zero placeholders · Zero TODOs · Zero stub functions
          • Every happy path AND every error path fully implemented
          • Secure coding: zeroize sensitive buffers, check all return values,
            use constant-time comparison for MACs/tags

          ── PHASE 3 · BUILD ──────────────────────────────────────────
          Run EXACTLY this command and capture ALL output:
            rm -rf build && cmake -B build -G Ninja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_CXX_STANDARD=20 \
              -DCMAKE_CXX_FLAGS=\"-Wall -Wextra -Werror -pedantic\" \
              && cmake --build build --parallel

          ── PHASE 4 · EVALUATE ───────────────────────────────────────
          cmake --build exits 0  →  SUCCESS. Stop immediately.
          cmake --build exits ≠0 →  Go to PHASE 5 right now.

          ── PHASE 5 · DIAGNOSE & FIX ─────────────────────────────────
          Read EVERY error and warning line. For each one:
            error: use of undeclared identifier
              → Search cppreference for the correct header and include it
            error: no matching function
              → fetch_url the cppreference page, read the exact overload set
            error: undefined reference to X
              → Add X's library to target_link_libraries in CMakeLists.txt
            warning: unused parameter [-Wunused-parameter]
              → Add [[maybe_unused]] or actually use the parameter
            warning: narrowing conversion
              → Add an explicit static_cast<> with a comment explaining safety
            warning: deprecated
              → brave_web_search for the modern replacement, use that instead
            ANY other diagnostic
              → Fix the root cause. NEVER suppress with pragmas or casts
                unless mathematically provable safe, and commented.
          Commit ALL fixes in one commit with a clear message.
          Return to PHASE 3.

          ── PHASE 6 · REPEAT ─────────────────────────────────────────
          Loop PHASE 3 → 4 → 5 until PHASE 4 says SUCCESS.
          Max iterations available: $MAX_ITERATIONS
          YOU MUST NOT STOP until cmake exits with code 0."

          # ── Guard: fail loudly if aider made zero commits ─────────
          COMMITS_AHEAD=$(git rev-list --count origin/main..HEAD 2>/dev/null || echo 0)
          echo "Commits ahead of main: $COMMITS_AHEAD"
          if [ "$COMMITS_AHEAD" -eq 0 ]; then
            echo "::error::Aider produced zero commits — model failed silently."
            exit 1
          fi

      # ── 10. SAST gate (cppcheck) ─────────────────────────────────
      - name: SAST — cppcheck
        run: |
          set -euo pipefail
          CPP_FILES=$(git diff --name-only origin/main..HEAD \
                      | grep -E '\.(cpp|h|hpp|cxx)$' || true)

          if [ -z "$CPP_FILES" ]; then
            echo "No C++ source files found — skipping cppcheck."
            exit 0
          fi

          echo "Running cppcheck on:"
          echo "$CPP_FILES"

          cppcheck \
            --enable=warning,style,performance,portability \
            --std=c++20 \
            --suppress=missingIncludeSystem \
            --error-exitcode=1 \
            --inline-suppr \
            $CPP_FILES \
          || {
            echo "::error::cppcheck found issues. Fix them before merging."
            exit 1
          }

      # ── 11. Ship ─────────────────────────────────────────────────
      - name: Ship — push branch & open PR
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          BRANCH="forge/${{ github.run_id }}"
          git push -u origin "$BRANCH"

          COMMIT_COUNT=$(git rev-list --count origin/main..HEAD)

          gh pr create \
            --title "🔨 Forge: ${{ github.event.inputs.task_description }}" \
            --body "## Forge Build Report

          | Field            | Value |
          |------------------|-------|
          | **Status**       | ✅ Build verified green |
          | **Agent**        | Aider (autonomous loop) |
          | **Model**        | inclusionai/ling-2.6-1t |
          | **Token limit**  | None (unlimited API) |
          | **MCP Servers**  | brave-search · mcp-server-fetch |
          | **Commits**      | $COMMIT_COUNT |
          | **SAST**         | cppcheck passed |
          | **Timeout**      | 3 hours |
          | **Run**          | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

          > Brave Search MCP was active during generation — all API signatures
          > were grounded against live documentation before use." \
            --base main \
            --head "$BRANCH"

      # ── 12. Failure diagnostics ───────────────────────────────────
      - name: Dump logs on failure
        if: failure()
        run: |
          echo "=== Last 20 git commits ==="
          git log --oneline -20 || true
          echo "=== .aider.mcp.json ==="
          cat .aider.mcp.json || true
          echo "=== CMake error log ==="
          cat build/CMakeFiles/CMakeError.log 2>/dev/null || true
          echo "=== cppcheck output ==="
          cppcheck --version || true
