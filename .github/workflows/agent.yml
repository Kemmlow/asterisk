name: Cline Flask PR

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  cline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Cline CLI
        run: npm install -g cline

      - name: Configure Cline env
        run: |
          echo "CLINE_DIR=$RUNNER_TEMP/cline" >> "$GITHUB_ENV"

      - name: Auth Cline to Kimi proxy
        run: |
          cline auth \
            -p openai \
            -k dummy \
            -m kimi-k2.6 \
            -b https://kemmlowww-glm-5-1.hf.space/v1

      - name: Run Cline to create Flask app
        run: |
          PROMPT=$(cat <<'EOF'
          Create a minimal Flask app in the repository root.

          Requirements:
          - write app.py in the root
          - app.py must use Flask
          - route '/' must return 'Hello from Codex'
          - write requirements.txt with only flask
          - do not add extra files
          - keep the code minimal and clean
          EOF
          )

          cline -y --json -c "$GITHUB_WORKSPACE" "$PROMPT"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: cline/flask-app
          title: "Cline: add minimal Flask app"
          body: |
            Generated with Cline CLI using the updated Kimi proxy.
          commit-message: "feat: add minimal Flask app"
          delete-branch: true
