name: "Forge: Aider + Novita AI"

on:
  workflow_dispatch:
    inputs:
      task_description:
        description: 'Target Build Task'
        required: true
        default: 'Write a prod grade crypter in cpp 20, with super duper huper level brilliance accuracy, ZERO BREVITY, ZERO EXAMPLE/CONCEPTUAL CODE, ONLY REAL WORLD HYPER COMPLEX BEST CODE'

jobs:
  forge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install -q aider-chat
          sudo apt-get update -qq
          sudo apt-get install -y build-essential cmake ninja-build libssl-dev

      - name: Forge
        env:
          OPENAI_API_KEY: ${{ secrets.NOVITA_API_KEY }}
          OPENAI_API_BASE: "https://api.novita.ai/openai/v1"
        run: |
          git config user.name "forge-bot"
          git config user.email "forge@ci.local"
          git checkout -b "forge/${{ github.run_id }}"

          SKILL=$(cat PROMPT.md 2>/dev/null || echo "You are an elite C++ engineer. Write production code only.")

          cat > /tmp/forge_task.txt << 'TASK'
          $SKILL

          CRITICAL TASK: ${{ github.event.inputs.task_description }}

          EXECUTION PROTOCOL (MANDATORY):
          1. Implement all code in C++20 (zero stubs, zero TODOs, zero placeholders)
          2. Create complete CMakeLists.txt with all targets
          3. Run: cmake -B build -G Ninja -DCMAKE_CXX_FLAGS="-std=c++20 -Wall -Wextra"
          4. Run: cmake --build build --parallel
          5. IF BUILD FAILS: Read error output, fix code, goto step 3
          6. REPEAT until build succeeds with ZERO errors
          7. Only exit when: cmake --build build completes successfully

          DO NOT STOP until the build is GREEN.
          TASK

          aider \
            --model "openai/inclusionai/ling-2.6-1t" \
            --yes-always \
            --auto-commits \
            --no-auto-lint \
            --message "$(cat /tmp/forge_task.txt)"

          # Final verification
          if [ -f CMakeLists.txt ]; then
            cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_FLAGS="-std=c++20"
            cmake --build build --parallel || {
              echo "❌ Build still failing after agent completion"
              exit 1
            }
          fi

      - name: Ship
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push -u origin "forge/${{ github.run_id }}"
          gh pr create \
            --title "Forge: ${{ github.event.inputs.task_description }}" \
            --body "**Autonomous build** • Agent: Aider • Model: ling-2.6-1t" \
            --base main \
            --head "forge/${{ github.run_id }}"
