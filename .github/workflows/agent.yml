name: "Forge: Codex CLI + Novita AI"

on:
  workflow_dispatch:
    inputs:
      task_description:
        description: 'Target Build Task'
        required: true
        default: 'Write a prod grade crypter in cpp 20, with super duper huper level brilliance accuracy, ZERO BREVITY, ZERO EXAMPLE/CONCEPTUAL CODE, ONLY REAL WORLD HYPER COMPLEX BEST CODE'

jobs:
  forge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Install Build Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential cmake ninja-build libssl-dev

      - name: Load PROMPT.md as AGENTS.md
        run: |
          [ ! -f PROMPT.md ] && echo "❌ PROMPT.md missing" && exit 1
          cp PROMPT.md AGENTS.md
          echo "✓ AGENTS.md loaded:"
          cat AGENTS.md

      - name: Configure Codex → Novita AI
        env:
          NOVITA_API_KEY: ${{ secrets.NOVITA_API_KEY }}
        run: |
          mkdir -p ~/.codex
          cat > ~/.codex/config.toml << TOML
          model = "inclusionai/ling-2.6-1t"
          model_provider = "novitaai"

          [model_providers.novitaai]
          name = "Novita AI"
          base_url = "https://api.novita.ai/openai"
          wire_api = "responses"
          http_headers = { "Authorization" = "Bearer ${NOVITA_API_KEY}" }
          TOML
          echo "✓ Config written"

      - name: Configure Git
        run: |
          git config user.name  "codex-forge-bot"
          git config user.email "forge@ci.local"

      - name: Run Codex Agent
        run: codex exec "${{ github.event.inputs.task_description }}"

      - name: Build Check
        run: |
          if [ -f CMakeLists.txt ]; then
            cmake -B build -G Ninja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_CXX_FLAGS="-Wall -Wextra -std=c++20"
            cmake --build build --parallel
          else
            echo "No CMakeLists.txt — syntax checking .cpp files"
            find . -maxdepth 4 -name '*.cpp' ! -path './build/*' \
              -exec g++ -std=c++20 -Wall -Wextra -fsyntax-only {} \;
          fi

      - name: Commit and Push
        run: |
          BRANCH="forge/patch-${{ github.run_id }}"
          git checkout -b "$BRANCH"
          git rm --cached AGENTS.md 2>/dev/null || true
          rm -f AGENTS.md
          git add -A
          git diff --cached --quiet || git commit -m "feat: ${{ github.event.inputs.task_description }}"
          git push origin "$BRANCH"

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "Forge: ${{ github.event.inputs.task_description }}" \
            --body "| | |
          |---|---|
          | **Agent** | Codex CLI |
          | **Model** | \`ling-2.6-1t\` via Novita AI |
          | **Run** | ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} |" \
            --base main \
            --head "forge/patch-${{ github.run_id }}"
